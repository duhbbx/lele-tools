<!doctype html>
<html lang="en">
<meta charset="utf-8">
<head>
  <script src="qrc:/qtwebchannel/qwebchannel.js"></script>
  <link rel="stylesheet" type="text/css" href="3rdparty/github-markdown.css">
  <script src="3rdparty/marked.min.js"></script>

</head>
<body>
  <div class="markdown-body" id="placeholder"></div>
<!--  <h1>我擦了.......</h1>-->
  <script>
  'use strict';

<!--  var placeholder = document.getElementById('placeholder');-->




  var updateText = function(text) {
    document.getElementById('placeholder').innerHTML = marked.parse(text);
  }

  new QWebChannel(qt.webChannelTransport,
    function(channel) {
      var content = channel.objects.content;
      updateText(content.text);
      content.textChanged.connect(updateText);
    }
  );
  </script>
</body>
</html>
