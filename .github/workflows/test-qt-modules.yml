# Qt模块测试工作流
# 功能：验证特定Qt版本和模块的可用性，用于调试构建问题
name: Test Qt Modules

# 触发条件：仅手动触发
# 用于调试Qt模块安装问题和验证新版本兼容性
on:
  workflow_dispatch:              # 手动触发
    inputs:
      qt_version:
        description: 'Qt version to test'                    # 要测试的Qt版本
        required: true
        default: '6.9.1'
      test_modules:
        description: 'Modules to test (space separated)'     # 要测试的模块列表
        required: true
        default: 'qtmultimedia qtwebengine'

jobs:
  # Qt模块测试任务
  # 验证指定Qt版本和模块的可用性
  test-qt-modules:
    runs-on: windows-latest
    
    steps:
    # 步骤1: 检出代码（用于访问项目配置）
    - name: Checkout code
      uses: actions/checkout@v4
      
    # 步骤2: 查询可用的Qt模块
    # 使用aqt工具列出指定Qt版本的所有可用模块
    - name: List available Qt modules
      shell: powershell
      run: |
        Write-Host "=== 查询Qt ${{ github.event.inputs.qt_version }} 可用模块 ===" -ForegroundColor Cyan
        
        # 安装aqt命令行工具（Qt安装器）
        pip install aqtinstall
        
        # 列出指定版本的所有可用模块
        Write-Host "所有可用模块:" -ForegroundColor Yellow
        python -m aqt list-qt windows desktop --modules ${{ github.event.inputs.qt_version }} win64_msvc2022_64
        
    - name: Test Qt installation with specific modules
      shell: powershell
      run: |
        Write-Host "=== 测试Qt模块安装 ===" -ForegroundColor Cyan
        
        $modules = "${{ github.event.inputs.test_modules }}"
        Write-Host "测试模块: $modules" -ForegroundColor Yellow
        
        # 尝试安装Qt和指定模块
        python -m aqt install-qt windows desktop ${{ github.event.inputs.qt_version }} win64_msvc2022_64 --modules $modules
        
        # 检查安装结果
        $QtDir = "${{ runner.workspace }}/Qt/${{ github.event.inputs.qt_version }}/msvc2022_64"
        Write-Host "Qt安装目录: $QtDir" -ForegroundColor Green
        
        if (Test-Path $QtDir) {
            Write-Host "Qt安装成功!" -ForegroundColor Green
            
            # 列出lib/cmake目录内容
            $CmakeDir = "$QtDir/lib/cmake"
            if (Test-Path $CmakeDir) {
                Write-Host "可用的CMake模块:" -ForegroundColor Yellow
                Get-ChildItem $CmakeDir | ForEach-Object {
                    Write-Host "  - $($_.Name)" -ForegroundColor Gray
                }
            }
            
            # 检查Multimedia模块
            $MultimediaConfig = "$CmakeDir/Qt6Multimedia/Qt6MultimediaConfig.cmake"
            if (Test-Path $MultimediaConfig) {
                Write-Host "✓ Qt6Multimedia配置文件存在" -ForegroundColor Green
            } else {
                Write-Host "✗ Qt6Multimedia配置文件不存在" -ForegroundColor Red
            }
            
            # 检查MultimediaWidgets
            $MultimediaWidgetsConfig = "$CmakeDir/Qt6MultimediaWidgets/Qt6MultimediaWidgetsConfig.cmake"
            if (Test-Path $MultimediaWidgetsConfig) {
                Write-Host "✓ Qt6MultimediaWidgets配置文件存在" -ForegroundColor Green
            } else {
                Write-Host "✗ Qt6MultimediaWidgets配置文件不存在" -ForegroundColor Yellow
                Write-Host "  (这可能是正常的，MultimediaWidgets可能包含在Multimedia中)" -ForegroundColor Yellow
            }
        } else {
            Write-Host "Qt安装失败!" -ForegroundColor Red
        }
        
    - name: Test CMake configuration
      shell: powershell
      run: |
        Write-Host "=== 测试CMake配置 ===" -ForegroundColor Cyan
        
        $QtDir = "${{ runner.workspace }}/Qt/${{ github.event.inputs.qt_version }}/msvc2022_64"
        
        # 创建测试CMakeLists.txt
        $TestCMake = @"
cmake_minimum_required(VERSION 3.16)
project(QtMultimediaTest)

set(CMAKE_PREFIX_PATH "$QtDir")

find_package(Qt6 REQUIRED COMPONENTS Core Widgets)
find_package(Qt6 QUIET COMPONENTS Multimedia MultimediaWidgets)

if(Qt6Multimedia_FOUND)
    message(STATUS "Qt6Multimedia found: `${Qt6Multimedia_VERSION}")
else()
    message(WARNING "Qt6Multimedia not found")
endif()

if(Qt6MultimediaWidgets_FOUND)
    message(STATUS "Qt6MultimediaWidgets found: `${Qt6MultimediaWidgets_VERSION}")
else()
    message(WARNING "Qt6MultimediaWidgets not found")
endif()
"@
        
        $TestCMake | Out-File -FilePath "TestCMakeLists.txt" -Encoding UTF8
        
        # 测试CMake配置
        mkdir test-build
        cd test-build
        cmake -f ../TestCMakeLists.txt -DCMAKE_PREFIX_PATH="$QtDir"
