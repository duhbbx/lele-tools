# 手动构建工作流
# 功能：提供可自定义参数的按需构建，适用于测试和特殊需求
name: Manual Build

# 触发条件：仅支持手动触发
# 提供丰富的自定义选项，便于开发和测试
on:
  workflow_dispatch:              # 仅手动触发
    inputs:
      version:
        description: 'Version number (e.g., 1.2.0)'    # 版本号输入
        required: true
        default: '1.0.0'
      build_type:
        description: 'Build type'                       # 构建类型选择
        required: true
        default: 'Release'
        type: choice
        options:
        - Release    # 发布版本（优化编译）
        - Debug      # 调试版本（包含调试信息）
      create_installer:
        description: 'Create installer package'         # 是否创建安装包
        required: true
        default: true
        type: boolean
      upload_artifacts:
        description: 'Upload build artifacts'           # 是否上传构建产物
        required: true
        default: true
        type: boolean

jobs:
  # 手动构建任务
  # 根据用户输入的参数执行自定义构建
  manual-build:
    runs-on: windows-latest    # 使用Windows最新版本虚拟机
    
    steps:
    # 步骤1: 检出代码仓库
    - name: Checkout repository
      uses: actions/checkout@v4
      
    # 步骤2: 安装Qt框架
    # 配置与主构建流水线相同，确保环境一致性
    - name: Setup Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.9.1'                # 固定Qt版本，确保构建稳定性
        host: windows                    # Windows主机
        target: desktop                  # 桌面应用目标
        arch: win64_msvc2022_64         # 64位架构 + MSVC2022编译器
        tools: 'tools_ifw'              # Qt安装框架（创建安装包必需）
        modules: 'qtmultimedia'          # 多媒体模块（摄像头功能）
        cache: true                      # 启用缓存提升构建速度
        
    - name: Setup MSVC
      uses: microsoft/setup-msbuild@v2
      
    - name: Setup CMake and Ninja
      uses: lukka/get-cmake@latest
      
    - name: Cache vcpkg
      uses: actions/cache@v4
      id: vcpkg-cache
      with:
        path: C:\vcpkg
        key: ${{ runner.os }}-vcpkg-redis-plus-plus-manual-v1
        restore-keys: |
          ${{ runner.os }}-vcpkg-
          
    - name: Setup vcpkg and dependencies
      if: steps.vcpkg-cache.outputs.cache-hit != 'true'
      shell: powershell
      run: |
        Write-Host "Setting up vcpkg and dependencies..." -ForegroundColor Green
        
        # Install vcpkg
        Write-Host "Installing vcpkg..." -ForegroundColor Yellow
        git clone https://github.com/Microsoft/vcpkg.git C:\vcpkg
        cd C:\vcpkg
        .\bootstrap-vcpkg.bat
        
        # Install redis-plus-plus and hiredis
        Write-Host "Installing redis-plus-plus..." -ForegroundColor Yellow
        .\vcpkg.exe install redis-plus-plus:x64-windows
        
        Write-Host "vcpkg and redis-plus-plus installed successfully!" -ForegroundColor Green
        
    - name: Set vcpkg environment
      shell: powershell
      run: |
        # Set environment variables
        echo "VCPKG_ROOT=C:\vcpkg" >> $env:GITHUB_ENV
        echo "VCPKG_INSTALLED_DIR=C:\vcpkg\installed\x64-windows" >> $env:GITHUB_ENV
      
    - name: Build project
      shell: powershell
      run: |
        Write-Host "=== Manual Build Started ===" -ForegroundColor Cyan
        Write-Host "Version: ${{ github.event.inputs.version }}" -ForegroundColor Yellow
        Write-Host "Build Type: ${{ github.event.inputs.build_type }}" -ForegroundColor Yellow
        
        # Setup paths
        $QtPath = $env:Qt6_DIR
        if (-not $QtPath) {
            $QtPath = "C:\Qt\6.9.1\msvc2022_64"
        }
        
        $ProjectRoot = Get-Location
        $BuildDir = "build"
        
        # Clean and create build directory
        if (Test-Path $BuildDir) {
            Remove-Item -Recurse -Force $BuildDir
        }
        New-Item -ItemType Directory -Path $BuildDir | Out-Null
        
        # Configure project with vcpkg toolchain
        Set-Location $BuildDir
        
        $CMakeArgs = @(
            $ProjectRoot,
            "-G", "Ninja",
            "-DCMAKE_BUILD_TYPE=${{ github.event.inputs.build_type }}",
            "-DCMAKE_PREFIX_PATH=$QtPath"
        )
        
        # Add vcpkg toolchain if available
        $VcpkgPath = $env:VCPKG_ROOT
        if ($VcpkgPath -and (Test-Path $VcpkgPath)) {
            $VcpkgToolchain = "$VcpkgPath\scripts\buildsystems\vcpkg.cmake"
            $CMakeArgs += "-DCMAKE_TOOLCHAIN_FILE=$VcpkgToolchain"
            $CMakeArgs += "-DENABLE_REDIS=ON"
            Write-Host "Using vcpkg toolchain: $VcpkgToolchain" -ForegroundColor Green
        } else {
            $CMakeArgs += "-DENABLE_REDIS=OFF"
            Write-Host "Building without Redis support" -ForegroundColor Yellow
        }
        
        Write-Host "Running cmake with args: $($CMakeArgs -join ' ')" -ForegroundColor Yellow
        & cmake @CMakeArgs
        
        if ($LASTEXITCODE -ne 0) {
            throw "CMake configuration failed"
        }
        
        # Build project
        cmake --build . --parallel
        
        if ($LASTEXITCODE -ne 0) {
            throw "Build failed"
        }
        
        # Find executable
        $ExeFile = Get-ChildItem -Filter "*.exe" -Recurse | 
            Where-Object { $_.Name -like "*lele*" -or $_.Name -like "*tools*" } |
            Where-Object { $_.Name -notlike "*Installer*" } |
            Select-Object -First 1
        
        if (-not $ExeFile) {
            throw "Executable not found"
        }
        
        Write-Host "Found executable: $($ExeFile.FullName)" -ForegroundColor Green
        
        # Deploy Qt dependencies
        $Windeployqt = "$QtPath\bin\windeployqt.exe"
        & $Windeployqt --release $ExeFile.FullName
        
        Write-Host "Build completed successfully!" -ForegroundColor Green
        Set-Location $ProjectRoot
        
    - name: Create installer
      if: github.event.inputs.create_installer == 'true'
      shell: powershell
      run: |
        Write-Host "Creating installer..." -ForegroundColor Green
        
        # Run the build script for installer creation
        if (Test-Path "script\build.ps1") {
            .\script\build.ps1 -Version "${{ github.event.inputs.version }}" -BuildType "${{ github.event.inputs.build_type }}"
        } else {
            Write-Host "Build script not found, skipping installer creation" -ForegroundColor Yellow
        }
        
    - name: Upload build artifacts
      if: github.event.inputs.upload_artifacts == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: lele-tools-manual-build-${{ github.event.inputs.version }}
        path: |
          build/*.exe
          build/*.dll
          LeleToolsInstaller_*.exe
        retention-days: 7
        
    - name: Build summary
      shell: powershell
      run: |
        Write-Host "=== Build Summary ===" -ForegroundColor Cyan
        Write-Host "Version: ${{ github.event.inputs.version }}" -ForegroundColor Yellow
        Write-Host "Build Type: ${{ github.event.inputs.build_type }}" -ForegroundColor Yellow
        Write-Host "Installer Created: ${{ github.event.inputs.create_installer }}" -ForegroundColor Yellow
        Write-Host "Artifacts Uploaded: ${{ github.event.inputs.upload_artifacts }}" -ForegroundColor Yellow
        
        if (Test-Path "build\*.exe") {
            $exeFiles = Get-ChildItem "build\*.exe"
            Write-Host "Built executables:" -ForegroundColor Green
            foreach ($exe in $exeFiles) {
                $size = [math]::Round($exe.Length / 1MB, 2)
                Write-Host "  - $($exe.Name) ($size MB)" -ForegroundColor Green
            }
        }
        
        if (Test-Path "LeleToolsInstaller_*.exe") {
            $installers = Get-ChildItem "LeleToolsInstaller_*.exe"
            Write-Host "Created installers:" -ForegroundColor Green
            foreach ($installer in $installers) {
                $size = [math]::Round($installer.Length / 1MB, 2)
                Write-Host "  - $($installer.Name) ($size MB)" -ForegroundColor Green
            }
        }







