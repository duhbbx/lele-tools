name: Manual Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.2.0)'
        required: true
        default: '1.0.0'
      build_type:
        description: 'Build type'
        required: true
        default: 'Release'
        type: choice
        options:
        - Release
        - Debug
      create_installer:
        description: 'Create installer package'
        required: true
        default: true
        type: boolean
      upload_artifacts:
        description: 'Upload build artifacts'
        required: true
        default: true
        type: boolean

jobs:
  manual-build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.9.1'
        host: windows
        target: desktop
        arch: win64_msvc2022_64
        tools: 'tools_ifw'
        cache: true
        
    - name: Setup MSVC
      uses: microsoft/setup-msbuild@v2
      
    - name: Setup CMake and Ninja
      uses: lukka/get-cmake@latest
      
    - name: Build project
      shell: powershell
      run: |
        Write-Host "=== Manual Build Started ===" -ForegroundColor Cyan
        Write-Host "Version: ${{ github.event.inputs.version }}" -ForegroundColor Yellow
        Write-Host "Build Type: ${{ github.event.inputs.build_type }}" -ForegroundColor Yellow
        
        # Setup paths
        $QtPath = $env:Qt6_DIR
        if (-not $QtPath) {
            $QtPath = "C:\Qt\6.9.1\msvc2022_64"
        }
        
        $ProjectRoot = Get-Location
        $BuildDir = "build"
        
        # Clean and create build directory
        if (Test-Path $BuildDir) {
            Remove-Item -Recurse -Force $BuildDir
        }
        New-Item -ItemType Directory -Path $BuildDir | Out-Null
        
        # Configure project
        Set-Location $BuildDir
        cmake $ProjectRoot -G Ninja -DCMAKE_BUILD_TYPE=${{ github.event.inputs.build_type }} -DCMAKE_PREFIX_PATH=$QtPath
        
        if ($LASTEXITCODE -ne 0) {
            throw "CMake configuration failed"
        }
        
        # Build project
        cmake --build . --parallel
        
        if ($LASTEXITCODE -ne 0) {
            throw "Build failed"
        }
        
        # Find executable
        $ExeFile = Get-ChildItem -Filter "*.exe" -Recurse | 
            Where-Object { $_.Name -like "*lele*" -or $_.Name -like "*tools*" } |
            Where-Object { $_.Name -notlike "*Installer*" } |
            Select-Object -First 1
        
        if (-not $ExeFile) {
            throw "Executable not found"
        }
        
        Write-Host "Found executable: $($ExeFile.FullName)" -ForegroundColor Green
        
        # Deploy Qt dependencies
        $Windeployqt = "$QtPath\bin\windeployqt.exe"
        & $Windeployqt --release $ExeFile.FullName
        
        Write-Host "Build completed successfully!" -ForegroundColor Green
        Set-Location $ProjectRoot
        
    - name: Create installer
      if: github.event.inputs.create_installer == 'true'
      shell: powershell
      run: |
        Write-Host "Creating installer..." -ForegroundColor Green
        
        # Run the build script for installer creation
        if (Test-Path "script\build.ps1") {
            .\script\build.ps1 -Version "${{ github.event.inputs.version }}" -BuildType "${{ github.event.inputs.build_type }}"
        } else {
            Write-Host "Build script not found, skipping installer creation" -ForegroundColor Yellow
        }
        
    - name: Upload build artifacts
      if: github.event.inputs.upload_artifacts == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: lele-tools-manual-build-${{ github.event.inputs.version }}
        path: |
          build/*.exe
          build/*.dll
          LeleToolsInstaller_*.exe
        retention-days: 7
        
    - name: Build summary
      shell: powershell
      run: |
        Write-Host "=== Build Summary ===" -ForegroundColor Cyan
        Write-Host "Version: ${{ github.event.inputs.version }}" -ForegroundColor Yellow
        Write-Host "Build Type: ${{ github.event.inputs.build_type }}" -ForegroundColor Yellow
        Write-Host "Installer Created: ${{ github.event.inputs.create_installer }}" -ForegroundColor Yellow
        Write-Host "Artifacts Uploaded: ${{ github.event.inputs.upload_artifacts }}" -ForegroundColor Yellow
        
        if (Test-Path "build\*.exe") {
            $exeFiles = Get-ChildItem "build\*.exe"
            Write-Host "Built executables:" -ForegroundColor Green
            foreach ($exe in $exeFiles) {
                $size = [math]::Round($exe.Length / 1MB, 2)
                Write-Host "  - $($exe.Name) ($size MB)" -ForegroundColor Green
            }
        }
        
        if (Test-Path "LeleToolsInstaller_*.exe") {
            $installers = Get-ChildItem "LeleToolsInstaller_*.exe"
            Write-Host "Created installers:" -ForegroundColor Green
            foreach ($installer in $installers) {
                $size = [math]::Round($installer.Length / 1MB, 2)
                Write-Host "  - $($installer.Name) ($size MB)" -ForegroundColor Green
            }
        }




