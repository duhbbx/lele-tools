name: Build and Release Lele Tools

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.2.0)'
        required: false
        default: '1.0.0'

env:
  QT_VERSION: '6.9.1'
  CMAKE_VERSION: '3.28'
  MSVC_VERSION: '2022'
  OPENCV_VERSION: '4.10.0'

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: ${{ env.QT_VERSION }}
        host: windows
        target: desktop
        arch: win64_msvc2022_64
        tools: 'tools_ifw'
        modules: 'qtwebengine'
        cache: true
        
    - name: Debug Qt installation
      shell: powershell
      run: |
        Write-Host "=== Qt Installation Debug ===" -ForegroundColor Cyan
        Write-Host "Environment Variables:" -ForegroundColor Yellow
        Write-Host "Qt6_DIR: $env:Qt6_DIR" -ForegroundColor Yellow
        Write-Host "QT_ROOT_DIR: $env:QT_ROOT_DIR" -ForegroundColor Yellow
        Write-Host "RUNNER_WORKSPACE: $env:RUNNER_WORKSPACE" -ForegroundColor Yellow
        Write-Host "GITHUB_WORKSPACE: $env:GITHUB_WORKSPACE" -ForegroundColor Yellow
        Write-Host "QT_VERSION: ${{ env.QT_VERSION }}" -ForegroundColor Yellow
        
        Write-Host "All Qt-related environment variables:" -ForegroundColor Cyan
        Get-ChildItem Env: | Where-Object { $_.Name -match "qt|Qt|QT" } | ForEach-Object {
            Write-Host "$($_.Name) = $($_.Value)" -ForegroundColor Gray
        }
        
        Write-Host "Checking possible Qt paths:" -ForegroundColor Cyan
        $Path1 = Join-Path $env:RUNNER_WORKSPACE "Qt\${{ env.QT_VERSION }}\msvc2022_64"
        $Path2 = "C:\Qt\${{ env.QT_VERSION }}\msvc2022_64"
        $Path3 = Join-Path $env:GITHUB_WORKSPACE "..\Qt\${{ env.QT_VERSION }}\msvc2022_64"
        
        Write-Host "Path 1: $Path1" -ForegroundColor Green
        if (Test-Path $Path1) {
            Write-Host "  Found!" -ForegroundColor Green
        } else {
            Write-Host "  Not found" -ForegroundColor Red
        }
        
        Write-Host "Path 2: $Path2" -ForegroundColor Green
        if (Test-Path $Path2) {
            Write-Host "  Found!" -ForegroundColor Green
        } else {
            Write-Host "  Not found" -ForegroundColor Red
        }
        
        Write-Host "Path 3: $Path3" -ForegroundColor Green
        if (Test-Path $Path3) {
            Write-Host "  Found!" -ForegroundColor Green
        } else {
            Write-Host "  Not found" -ForegroundColor Red
        }
        
        $QtWorkspaceDir = Join-Path $env:RUNNER_WORKSPACE "Qt"
        Write-Host "Checking RUNNER_WORKSPACE Qt directory: $QtWorkspaceDir" -ForegroundColor Green
        if (Test-Path $QtWorkspaceDir) {
            Write-Host "Found Qt directory" -ForegroundColor Green
            Get-ChildItem $QtWorkspaceDir | ForEach-Object { 
                Write-Host "  $($_.Name)" -ForegroundColor Gray 
            }
        } else {
            Write-Host "No Qt directory found" -ForegroundColor Red
        }
        
    - name: Setup MSVC
      uses: microsoft/setup-msbuild@v2
      
    - name: Setup CMake and Ninja
      uses: lukka/get-cmake@latest
      with:
        cmakeVersion: ${{ env.CMAKE_VERSION }}
        ninjaVersion: latest
        
    - name: Setup OpenCV
      shell: powershell
      run: |
        Write-Host "Setting up OpenCV ${{ env.OPENCV_VERSION }}..." -ForegroundColor Green
        
        # Download OpenCV pre-built binaries
        $OpenCVUrl = "https://github.com/opencv/opencv/releases/download/${{ env.OPENCV_VERSION }}/opencv-${{ env.OPENCV_VERSION }}-windows.exe"
        $OpenCVInstaller = "opencv-installer.exe"
        
        try {
            Write-Host "Downloading OpenCV from: $OpenCVUrl" -ForegroundColor Yellow
            Invoke-WebRequest -Uri $OpenCVUrl -OutFile $OpenCVInstaller -UseBasicParsing
            
            Write-Host "Extracting OpenCV..." -ForegroundColor Yellow
            # OpenCV Windows installer is a self-extracting archive
            Start-Process -FilePath $OpenCVInstaller -ArgumentList "-o", "C:\", "-y" -Wait -NoNewWindow
            
            # Verify installation
            $OpenCVPath = "C:\opencv"
            if (Test-Path $OpenCVPath) {
                Write-Host "OpenCV installed successfully at: $OpenCVPath" -ForegroundColor Green
                
                # Set environment variable for later steps
                echo "OPENCV_DIR=C:\opencv\build" >> $env:GITHUB_ENV
                
                # Add OpenCV bin to PATH for runtime
                $OpenCVBinPath = "C:\opencv\build\x64\vc16\bin"
                if (Test-Path $OpenCVBinPath) {
                    echo "$OpenCVBinPath" >> $env:GITHUB_PATH
                    Write-Host "Added OpenCV bin to PATH: $OpenCVBinPath" -ForegroundColor Green
                }
            } else {
                Write-Host "WARNING: OpenCV installation not found" -ForegroundColor Yellow
            }
        }
        catch {
            Write-Host "WARNING: Failed to install OpenCV: $($_.Exception.Message)" -ForegroundColor Yellow
            Write-Host "Continuing without OpenCV..." -ForegroundColor Yellow
        }
        finally {
            # Clean up installer
            if (Test-Path $OpenCVInstaller) {
                Remove-Item $OpenCVInstaller -Force
            }
        }
        
    - name: Cache Qt and tools
      uses: actions/cache@v4
      with:
        path: |
          ${{ runner.workspace }}/Qt
          C:/Qt
          C:/opencv
        key: ${{ runner.os }}-qt-${{ env.QT_VERSION }}-opencv-${{ env.OPENCV_VERSION }}-cache-v1
        
    - name: Create build script
      shell: powershell
      run: |
        # Create a simplified build script for GitHub Actions
        $QtVersion = "${{ env.QT_VERSION }}"
        
        # Create script content using array to avoid indentation issues
        $Lines = @()
        $Lines += 'param('
        $Lines += '    [string]$Version = "1.0.0"'
        $Lines += ')'
        $Lines += ''
        $Lines += '$ErrorActionPreference = "Stop"'
        $Lines += ''
        $Lines += 'Write-Host "=== GitHub Actions Build Script ===" -ForegroundColor Cyan'
        $Lines += 'Write-Host "Build Type: Release" -ForegroundColor Yellow'
        $Lines += 'Write-Host "Version: $Version" -ForegroundColor Yellow'
        $Lines += ''
        $Lines += '# Find Qt installation - prioritize environment variables from install-qt-action'
        $Lines += '$QtPath = $env:Qt6_DIR'
        $Lines += 'if (-not $QtPath) {'
        $Lines += '    $QtPath = $env:QT_ROOT_DIR'
        $Lines += '}'
        $Lines += 'if (-not $QtPath) {'
        $Lines += '    # Fallback to common paths'
        $Lines += '    $PossiblePaths = @('
        $Lines += "        (Join-Path `$env:RUNNER_WORKSPACE `"Qt\$QtVersion\msvc2022_64`"),"
        $Lines += "        `"C:\Qt\$QtVersion\msvc2022_64`","
        $Lines += '        (Join-Path $env:GITHUB_WORKSPACE "..\Qt\' + $QtVersion + '\msvc2022_64")'
        $Lines += '    )'
        $Lines += '    foreach ($Path in $PossiblePaths) {'
        $Lines += '        if (Test-Path $Path) {'
        $Lines += '            $QtPath = $Path'
        $Lines += '            break'
        $Lines += '        }'
        $Lines += '    }'
        $Lines += '}'
        $Lines += ''
        $Lines += 'if (-not $QtPath -or -not (Test-Path $QtPath)) {'
        $Lines += '    Write-Host "ERROR: Qt installation not found!" -ForegroundColor Red'
        $Lines += '    Write-Host "Checked paths:" -ForegroundColor Yellow'
        $Lines += '    Write-Host "  Qt6_DIR: $env:Qt6_DIR" -ForegroundColor Yellow'
        $Lines += '    Write-Host "  QT_ROOT_DIR: $env:QT_ROOT_DIR" -ForegroundColor Yellow'
        $Lines += '    throw "Qt installation not found!"'
        $Lines += '}'
        $Lines += ''
        $Lines += 'Write-Host "Qt Path: $QtPath" -ForegroundColor Cyan'
        $Lines += ''
        $Lines += '# Find OpenCV installation'
        $Lines += '$OpenCVPath = $env:OPENCV_DIR'
        $Lines += 'if (-not $OpenCVPath) {'
        $Lines += '    $OpenCVPath = "C:\opencv\build"'
        $Lines += '}'
        $Lines += ''
        $Lines += 'Write-Host "OpenCV Path: $OpenCVPath" -ForegroundColor Cyan'
        $Lines += ''
        $Lines += '# Project paths'
        $Lines += '$ProjectRoot = Get-Location'
        $Lines += '$BuildDir = Join-Path $ProjectRoot "build"'
        $Lines += ''
        $Lines += 'Write-Host "Project Root: $ProjectRoot" -ForegroundColor Cyan'
        $Lines += 'Write-Host "Build Directory: $BuildDir" -ForegroundColor Cyan'
        $Lines += ''
        $Lines += '# Step 1: Build project'
        $Lines += 'Write-Host "`nStep 1: Building project..." -ForegroundColor Green'
        $Lines += ''
        $Lines += 'if (Test-Path $BuildDir) {'
        $Lines += '    Remove-Item -Recurse -Force $BuildDir'
        $Lines += '}'
        $Lines += ''
        $Lines += 'New-Item -ItemType Directory -Path $BuildDir | Out-Null'
        $Lines += 'Set-Location $BuildDir'
        $Lines += ''
        $Lines += 'Write-Host "Configuring project..." -ForegroundColor Yellow'
        $Lines += ''
        $Lines += '# Setup CMAKE_PREFIX_PATH with Qt and OpenCV'
        $Lines += '$CMakePrefixPath = $QtPath'
        $Lines += 'if (Test-Path $OpenCVPath) {'
        $Lines += '    $CMakePrefixPath = "$QtPath;$OpenCVPath"'
        $Lines += '    Write-Host "Using OpenCV: $OpenCVPath" -ForegroundColor Green'
        $Lines += '} else {'
        $Lines += '    Write-Host "OpenCV not found, building without OpenCV support" -ForegroundColor Yellow'
        $Lines += '}'
        $Lines += ''
        $Lines += '# Configure with or without OpenCV'
        $Lines += 'if (Test-Path $OpenCVPath) {'
        $Lines += '    & cmake $ProjectRoot -G "Visual Studio 17 2022" -A x64 -DCMAKE_PREFIX_PATH="$CMakePrefixPath" -DWITH_OPENCV=ON'
        $Lines += '} else {'
        $Lines += '    Write-Host "Building without OpenCV support" -ForegroundColor Yellow'
        $Lines += '    & cmake $ProjectRoot -G "Visual Studio 17 2022" -A x64 -DCMAKE_PREFIX_PATH="$QtPath" -DWITH_OPENCV=OFF'
        $Lines += '}'
        $Lines += ''
        $Lines += 'if ($LASTEXITCODE -ne 0) {'
        $Lines += '    throw "Project configuration failed!"'
        $Lines += '}'
        $Lines += ''
        $Lines += 'Write-Host "Compiling project..." -ForegroundColor Yellow'
        $Lines += '& cmake --build . --config Release --parallel'
        $Lines += ''
        $Lines += 'if ($LASTEXITCODE -ne 0) {'
        $Lines += '    throw "Project compilation failed!"'
        $Lines += '}'
        $Lines += ''
        $Lines += 'Write-Host "OK Project build successful!" -ForegroundColor Green'
        $Lines += ''
        $Lines += '# Step 2: Find executable'
        $Lines += 'Write-Host "`nStep 2: Finding executable file..." -ForegroundColor Green'
        $Lines += ''
        $Lines += '$ExeFile = Get-ChildItem -Path "$BuildDir\Release" -Filter "*.exe" -ErrorAction SilentlyContinue |'
        $Lines += '    Where-Object { $_.Name -like "*lele*" -or $_.Name -like "*tools*" } |'
        $Lines += '    Where-Object { $_.Name -notlike "*Installer*" } |'
        $Lines += '    Sort-Object LastWriteTime -Descending |'
        $Lines += '    Select-Object -First 1'
        $Lines += ''
        $Lines += '# If not found in Release, try Debug or root build directory'
        $Lines += 'if (-not $ExeFile) {'
        $Lines += '    $ExeFile = Get-ChildItem -Path "$BuildDir\Debug" -Filter "*.exe" -ErrorAction SilentlyContinue |'
        $Lines += '        Where-Object { $_.Name -like "*lele*" -or $_.Name -like "*tools*" } |'
        $Lines += '        Where-Object { $_.Name -notlike "*Installer*" } |'
        $Lines += '        Sort-Object LastWriteTime -Descending |'
        $Lines += '        Select-Object -First 1'
        $Lines += '}'
        $Lines += ''
        $Lines += 'if (-not $ExeFile) {'
        $Lines += '    $ExeFile = Get-ChildItem -Path $BuildDir -Filter "*.exe" -Recurse |'
        $Lines += '        Where-Object { $_.Name -like "*lele*" -or $_.Name -like "*tools*" } |'
        $Lines += '        Where-Object { $_.Name -notlike "*Installer*" } |'
        $Lines += '        Sort-Object LastWriteTime -Descending |'
        $Lines += '        Select-Object -First 1'
        $Lines += '}'
        $Lines += ''
        $Lines += 'if (-Not $ExeFile) {'
        $Lines += '    throw "Executable file not found!"'
        $Lines += '}'
        $Lines += ''
        $Lines += 'Write-Host "Found executable file: $($ExeFile.FullName)" -ForegroundColor Green'
        $Lines += ''
        $Lines += '# Step 3: Deploy Qt dependencies'
        $Lines += 'Write-Host "`nStep 3: Deploying Qt dependencies..." -ForegroundColor Green'
        $Lines += ''
        $Lines += '$Windeployqt = "$QtPath/bin/windeployqt.exe"'
        $Lines += 'if (-Not (Test-Path $Windeployqt)) {'
        $Lines += '    throw "windeployqt.exe not found!"'
        $Lines += '}'
        $Lines += ''
        $Lines += 'Write-Host "Running windeployqt..." -ForegroundColor Yellow'
        $Lines += '& $Windeployqt --release --no-translations --no-system-d3d-compiler --no-opengl-sw $ExeFile.FullName'
        $Lines += ''
        $Lines += 'Write-Host "OK Qt dependencies deployed!" -ForegroundColor Green'
        $Lines += ''
        $Lines += '# Set output variables for GitHub Actions'
        $Lines += '$ExeDir = $ExeFile.DirectoryName'
        $Lines += '$ExeName = $ExeFile.Name'
        $Lines += ''
        $Lines += 'echo "exe_path=$($ExeFile.FullName)" >> $env:GITHUB_OUTPUT'
        $Lines += 'echo "exe_dir=$ExeDir" >> $env:GITHUB_OUTPUT'
        $Lines += 'echo "exe_name=$ExeName" >> $env:GITHUB_OUTPUT'
        $Lines += 'echo "build_dir=$BuildDir" >> $env:GITHUB_OUTPUT'
        $Lines += ''
        $Lines += 'Write-Host "`nBuild completed successfully!" -ForegroundColor Green'
        $Lines += ''
        $Lines += 'Set-Location $ProjectRoot'
        
        # Write all lines to the file
        $Lines | Out-File -FilePath "build-action.ps1" -Encoding UTF8
        
        # Debug: Show the generated script content
        Write-Host "=== Generated build-action.ps1 content ===" -ForegroundColor Cyan
        Get-Content "build-action.ps1" | Select-Object -First 20 | ForEach-Object { Write-Host $_ -ForegroundColor Gray }
        
    - name: Set version
      id: version
      shell: powershell
      run: |
        $version = "${{ github.event.inputs.version }}"
        if ([string]::IsNullOrEmpty($version)) {
            if ("${{ github.ref }}" -like "refs/tags/v*") {
                $version = "${{ github.ref_name }}".Substring(1)
            } else {
                $version = "1.0.${{ github.run_number }}"
            }
        }
        Write-Host "Version: $version"
        echo "version=$version" >> $env:GITHUB_OUTPUT
        
    - name: Build project
      id: build
      shell: powershell
      run: |
        .\build-action.ps1 -Version "${{ steps.version.outputs.version }}"
        
    - name: Create installer
      id: create_installer
      if: github.event_name != 'pull_request'
      shell: powershell
      run: |
        # Run the original installer creation logic
        Write-Host "Creating installer package..." -ForegroundColor Green
        
        # Use the logic from your build.ps1 script here
        $Version = "${{ steps.version.outputs.version }}"
        $BuildDir = "${{ steps.build.outputs.build_dir }}"
        $ExeDir = "${{ steps.build.outputs.exe_dir }}"
        
        # Find Qt installation - use same logic as build script
        $QtPath = $env:Qt6_DIR
        if (-not $QtPath) {
            $QtPath = $env:QT_ROOT_DIR
        }
        if (-not $QtPath -or -not (Test-Path $QtPath)) {
            # Fallback to common paths
            $PossiblePaths = @(
                (Join-Path $env:RUNNER_WORKSPACE "Qt\$env:QT_VERSION\msvc2022_64"),
                "C:\Qt\$env:QT_VERSION\msvc2022_64",
                (Join-Path $env:GITHUB_WORKSPACE "..\Qt\$env:QT_VERSION\msvc2022_64")
            )
            foreach ($Path in $PossiblePaths) {
                if (Test-Path $Path) {
                    $QtPath = $Path
                    break
                }
            }
        }
        
        if (-not $QtPath -or -not (Test-Path $QtPath)) {
            Write-Host "ERROR: Qt installation not found for installer creation!" -ForegroundColor Red
            throw "Qt installation not found!"
        }
        
        $IFWPath = Join-Path $QtPath "../../Tools/QtInstallerFramework/4.10/bin"
        if (-not (Test-Path $IFWPath)) {
            $IFWSearchPath = "$QtPath/../../../Tools/QtInstallerFramework/*/bin"
            try {
                $IFWPath = Get-ChildItem -Path $IFWSearchPath -Directory -ErrorAction SilentlyContinue | Select-Object -First 1 | ForEach-Object FullName
                if (-not $IFWPath) {
                    Write-Host "WARNING: Qt Installer Framework not found, installer creation may fail" -ForegroundColor Yellow
                    $IFWPath = ""
                }
            } catch {
                Write-Host "WARNING: Failed to find Qt Installer Framework: $($_.Exception.Message)" -ForegroundColor Yellow
                $IFWPath = ""
            }
        }
        
        $ProjectRoot = Get-Location
        $IFWProject = Join-Path $ProjectRoot "project_installer"
        $ConfigDir = Join-Path $IFWProject "config"
        $PackagesDir = Join-Path $IFWProject "packages\com.leletools"
        $MetaDir = Join-Path $PackagesDir "meta"
        $DataDir = Join-Path $PackagesDir "data"
        $ConfigXmlPath = Join-Path $ConfigDir "config.xml"
        $PackageXmlPath = Join-Path $MetaDir "package.xml"
        $InstallScriptPath = Join-Path $MetaDir "installscript.qs"
        
        # Copy application files
        Write-Host "Copying application files..." -ForegroundColor Yellow
        
        $FilesToCopy = Get-ChildItem -Path $ExeDir -File | 
            Where-Object { ($_.Extension -eq ".exe" -or $_.Extension -eq ".dll") -and 
                           $_.Name -notlike "*Installer*" }
        
        foreach ($file in $FilesToCopy) {
            Copy-Item -Path $file.FullName -Destination $DataDir -Force
            Write-Host "  Copied: $($file.Name)" -ForegroundColor Green
        }
        
        # Copy Qt directories
        $QtDirs = @('platforms', 'imageformats', 'styles', 'translations', 'iconengines', 'generic', 'networkinformation', 'tls')
        foreach ($qtDir in $QtDirs) {
            $QtDirPath = Join-Path $ExeDir $qtDir
            if (Test-Path $QtDirPath) {
                $TargetPath = Join-Path $DataDir $qtDir
                Copy-Item -Path $QtDirPath -Destination $TargetPath -Recurse -Force
                Write-Host "  Copied directory: $qtDir" -ForegroundColor Green
            }
        }
        
        # Create installer
        $BinaryCreator = Join-Path $IFWPath "binarycreator.exe"
        $InstallerName = "LeleToolsInstaller_v$($Version.Replace('.','_')).exe"
        $InstallerPath = Join-Path $ProjectRoot $InstallerName
        
        Write-Host "Creating installer: $InstallerName" -ForegroundColor Yellow
        $PackagesRootDir = Split-Path $DataDir -Parent | Split-Path -Parent
        
        & $BinaryCreator --offline-only -c $ConfigXmlPath -p $PackagesRootDir $InstallerPath
        
        if ($LASTEXITCODE -eq 0 -and (Test-Path $InstallerPath)) {
            $InstallerSize = [math]::Round((Get-Item $InstallerPath).Length / 1MB, 2)
            Write-Host "Installer created successfully!" -ForegroundColor Green
            Write-Host "  File: $InstallerPath" -ForegroundColor Cyan
            Write-Host "  Size: $InstallerSize MB" -ForegroundColor Cyan
            
            echo "installer_path=$InstallerPath" >> $env:GITHUB_OUTPUT
            echo "installer_name=$InstallerName" >> $env:GITHUB_OUTPUT
            echo "installer_size=$InstallerSize" >> $env:GITHUB_OUTPUT
        } else {
            throw "Installer creation failed!"
        }
        
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: lele-tools-build-${{ steps.version.outputs.version }}
        path: |
          ${{ steps.build.outputs.build_dir }}/*.exe
          ${{ steps.build.outputs.build_dir }}/*.dll
        retention-days: 30
        
    - name: Upload installer artifact
      if: github.event_name != 'pull_request'
      uses: actions/upload-artifact@v4
      with:
        name: lele-tools-installer-${{ steps.version.outputs.version }}
        path: "*.exe"
        retention-days: 90
        
    - name: Create release
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          LeleToolsInstaller_*.exe
        name: Lele Tools ${{ steps.version.outputs.version }}
        body: |
          ## Lele Tools ${{ steps.version.outputs.version }}
          
          ### 🚀 新功能
          - 一键构建、部署和打包
          - 智能覆盖安装处理
          - 版本管理和自动化
          
          ### 📦 下载
          - **Windows 安装包**: LeleToolsInstaller_${{ steps.version.outputs.version }}.exe (${{ steps.create_installer.outputs.installer_size }} MB)
          
          ### 🔧 安装说明
          1. 下载对应的安装包
          2. 以管理员身份运行安装程序
          3. 选择安装目录（支持覆盖现有安装）
          4. 完成安装并启动应用
          
          ### 📋 系统要求
          - Windows 10/11 (x64)
          - Visual C++ Redistributable 2022
          
          ---
          
          **完整构建信息**: 
          - 构建类型: Release
          - Qt版本: ${{ env.QT_VERSION }}
          - 提交: ${{ github.sha }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
