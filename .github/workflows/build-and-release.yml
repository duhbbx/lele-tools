# 主要构建和发布流水线
# 功能：自动构建Windows和Linux版本，创建安装包和便携包，发布GitHub Release
name: Build and Release Lele Tools

# 触发条件：
# 1. 推送到主分支 (main/master) - 创建预发布版本
# 2. 推送标签 (v*) - 创建正式发布版本  
# 3. Pull Request - 仅构建测试，不发布
# 4. 手动触发 - 可自定义参数
on:
  push:
    branches: [ main, master ]    # 推送到主分支时触发
    tags: [ 'v*' ]               # 推送版本标签时触发（如 v1.0.0）
  pull_request:
    branches: [ main, master ]    # 针对主分支的PR时触发
  workflow_dispatch:              # 允许手动触发
    inputs:
      version:
        description: 'Version number (e.g., 1.2.0)'
        required: false
        default: '1.0.0'
      create_release:
        description: 'Create GitHub Release'
        required: false
        default: true
        type: boolean

# GitHub Actions权限配置
# 需要写入权限来创建Release和上传文件
permissions:
  contents: write    # 创建Release、上传文件
  packages: write    # 发布包到GitHub Packages
  actions: read      # 读取Actions状态

# 全局环境变量
# 统一管理版本号，便于维护和升级
env:
  QT_VERSION_WINDOWS: '6.9.1'   # Windows平台Qt版本
  QT_VERSION_LINUX: '6.5.3'     # Linux平台Qt版本（LTS稳定版）
  CMAKE_VERSION: '3.28'          # CMake构建工具版本
  MSVC_VERSION: '2022'           # Visual Studio编译器版本
  OPENCV_VERSION: '4.12.0'       # OpenCV计算机视觉库版本（可选）

jobs:
  # Windows构建任务
  # 负责构建Windows版本的可执行文件、安装包和便携包
  build-windows:
    runs-on: windows-latest    # Use latest Windows virtual machine
    
    steps:
    # 步骤1: 检出源代码
    # 获取仓库的最新代码到构建环境
    - name: Checkout code
      uses: actions/checkout@v4

    # 缓存 Npcap SDK
    - name: Cache Npcap SDK
      uses: actions/cache@v4
      id: npcap-cache
      with:
        path: ${{ github.workspace }}/npcap-sdk
        key: ${{ runner.os }}-npcap-sdk-1.15-v1
        restore-keys: |
          ${{ runner.os }}-npcap-sdk-1.15
          ${{ runner.os }}-npcap-sdk

    # 下载 Npcap SDK（仅在缓存未命中时执行）
    - name: Download Npcap SDK
      if: steps.npcap-cache.outputs.cache-hit != 'true'
      shell: powershell
      run: |
        $url = "https://npcap.com/dist/npcap-sdk-1.15.zip"
        $zipFile = "$env:GITHUB_WORKSPACE\npcap-sdk.zip"
        $destDir = "$env:GITHUB_WORKSPACE\npcap-sdk"

        Write-Host "Downloading Npcap SDK from $url ..." -ForegroundColor Green
        Invoke-WebRequest -Uri $url -OutFile $zipFile

        Write-Host "Downloaded file size: $(Get-Item $zipFile).Length bytes" -ForegroundColor Yellow

        Write-Host "Expanding archive to $destDir ..." -ForegroundColor Green
        Expand-Archive $zipFile -DestinationPath $destDir

        Write-Host "Npcap SDK download and extraction complete." -ForegroundColor Green

        # 清理下载的ZIP文件
        Remove-Item $zipFile -Force

    - name: Verify Npcap SDK
      shell: powershell
      run: |
        $destDir = "$env:GITHUB_WORKSPACE\npcap-sdk"
        if (Test-Path $destDir) {
            Write-Host "[OK] Npcap SDK directory exists: $destDir" -ForegroundColor Green

            # 检查关键文件
            $includeDir = "$destDir\Include"
            $libDir = "$destDir\Lib\x64"

            if (Test-Path "$includeDir\pcap.h") {
                Write-Host "[OK] Found pcap.h" -ForegroundColor Green
            } else {
                Write-Host "[ERROR] pcap.h not found" -ForegroundColor Red
            }

            if (Test-Path "$libDir\wpcap.lib") {
                Write-Host "[OK] Found wpcap.lib" -ForegroundColor Green
            } else {
                Write-Host "[ERROR] wpcap.lib not found" -ForegroundColor Red
            }
        } else {
            Write-Host "[ERROR] Npcap SDK directory not found!" -ForegroundColor Red
            exit 1
        }

    # 步骤2: 缓存和安装OpenCV计算机视觉库
    # OpenCV是计算机视觉和图像处理的核心库，需要早期安装以供其他依赖使用
    - name: Cache OpenCV
      uses: actions/cache@v4
      id: opencv-cache
      with:
        path: C:\opencv
        key: ${{ runner.os }}-opencv-${{ env.OPENCV_VERSION }}-v3
        restore-keys: |
          ${{ runner.os }}-opencv-${{ env.OPENCV_VERSION }}-v2
          ${{ runner.os }}-opencv-${{ env.OPENCV_VERSION }}-v1
          ${{ runner.os }}-opencv-${{ env.OPENCV_VERSION }}
          ${{ runner.os }}-opencv

    - name: Setup OpenCV
      shell: powershell
      run: |
        Write-Host "Setting up OpenCV ${{ env.OPENCV_VERSION }}..." -ForegroundColor Green

        # 检查是否已经安装（缓存命中）
        $OpenCVPath = "C:\opencv"
        if (Test-Path $OpenCVPath) {
            Write-Host "[OK] OpenCV found in cache: $OpenCVPath" -ForegroundColor Green

            # 验证关键文件是否存在
            $keyFiles = @(
                "$OpenCVPath\build\include\opencv2\opencv.hpp",
                "$OpenCVPath\build\x64\vc16\lib\opencv_world*.lib",
                "$OpenCVPath\build\x64\vc16\bin\opencv_world*.dll"
            )

            $allFound = $true
            foreach ($pattern in $keyFiles) {
                $files = Get-ChildItem -Path $pattern -ErrorAction SilentlyContinue
                if ($files.Count -gt 0) {
                    Write-Host "[OK] Found: $($files[0].FullName)" -ForegroundColor Green
                } else {
                    Write-Host "[ERROR] Missing critical files matching: $pattern" -ForegroundColor Red
                    $allFound = $false
                }
            }

            if ($allFound) {
                Write-Host "[OK] OpenCV cache validation passed" -ForegroundColor Green
                exit 0  # 成功退出，跳过下载
            } else {
                Write-Host "[WARNING] OpenCV cache corrupted, will re-download" -ForegroundColor Yellow
                Remove-Item $OpenCVPath -Recurse -Force -ErrorAction SilentlyContinue
            }
        }

        Write-Host "Downloading OpenCV..." -ForegroundColor Yellow

        try {
            # 直接使用OpenCV官方预编译的exe安装包
            Write-Host "Downloading OpenCV pre-built binaries..." -ForegroundColor Yellow
            $OpenCVUrl = "https://github.com/opencv/opencv/releases/download/${{ env.OPENCV_VERSION }}/opencv-${{ env.OPENCV_VERSION }}-windows.exe"
            $OpenCVInstaller = "opencv-installer.exe"

            # 下载OpenCV安装包（带重试机制）
            $maxRetries = 3
            $retryCount = 0
            while ($retryCount -lt $maxRetries) {
                try {
                    Write-Host "Downloading OpenCV (attempt $($retryCount + 1)/$maxRetries)..." -ForegroundColor Yellow
                    Invoke-WebRequest -Uri $OpenCVUrl -OutFile $OpenCVInstaller -UseBasicParsing -TimeoutSec 300

                    # 验证下载文件大小
                    $fileSize = (Get-Item $OpenCVInstaller).Length
                    Write-Host "Downloaded file size: $([math]::Round($fileSize / 1MB, 2)) MB" -ForegroundColor Yellow

                    if ($fileSize -lt 1MB) {
                        throw "Downloaded file too small, possibly corrupted"
                    }

                    break
                } catch {
                    $retryCount++
                    if ($retryCount -eq $maxRetries) { throw }
                    Write-Host "Download failed, retrying in 10 seconds..." -ForegroundColor Yellow
                    Start-Sleep -Seconds 10
                }
            }

            # 使用7-Zip解压（OpenCV exe实际上是自解压压缩包）
            Write-Host "Extracting OpenCV..." -ForegroundColor Yellow

            # 首先尝试直接执行自解压
            try {
                Write-Host "Trying direct extraction..." -ForegroundColor Yellow
                # OpenCV官方exe使用的是7-Zip SFX格式，需要使用 -o 参数指定输出目录
                $extractArgs = @("-oC:\", "-y")
                $process = Start-Process -FilePath $OpenCVInstaller -ArgumentList $extractArgs -Wait -PassThru -NoNewWindow

                if ($process.ExitCode -ne 0) {
                    throw "Self-extraction failed with exit code: $($process.ExitCode)"
                }

                Write-Host "[OK] Direct extraction successful" -ForegroundColor Green
            } catch {
                Write-Host "Direct extraction failed, trying 7-Zip..." -ForegroundColor Yellow

                # 尝试使用7-Zip
                $7zipPath = "${env:ProgramFiles}\7-Zip\7z.exe"
                if (Test-Path $7zipPath) {
                    & $7zipPath x $OpenCVInstaller "-oC:\" -y
                    Write-Host "[OK] 7-Zip extraction completed" -ForegroundColor Green
                } else {
                    # 最后尝试：重命名为zip文件并解压
                    Write-Host "7-Zip not found, trying PowerShell extraction..." -ForegroundColor Yellow
                    $tempZip = "opencv-temp.zip"
                    Copy-Item $OpenCVInstaller $tempZip

                    try {
                        Add-Type -AssemblyName System.IO.Compression.FileSystem
                        [System.IO.Compression.ZipFile]::ExtractToDirectory($tempZip, "C:\")
                        Write-Host "[OK] PowerShell extraction completed" -ForegroundColor Green
                    } finally {
                        Remove-Item $tempZip -Force -ErrorAction SilentlyContinue
                    }
                }
            }

            # 检查并移动文件到正确位置
            $possiblePaths = @(
                "C:\opencv-${{ env.OPENCV_VERSION }}-windows",
                "C:\opencv-4.12.0-windows",
                "C:\opencv"
            )

            $foundPath = $null
            foreach ($path in $possiblePaths) {
                if (Test-Path $path) {
                    $foundPath = $path
                    Write-Host "Found OpenCV at: $path" -ForegroundColor Green
                    break
                }
            }

            if ($foundPath -and $foundPath -ne "C:\opencv") {
                Write-Host "Moving OpenCV from $foundPath to C:\opencv..." -ForegroundColor Yellow
                if (Test-Path "C:\opencv") {
                    Remove-Item "C:\opencv" -Recurse -Force
                }
                Move-Item $foundPath "C:\opencv"
            }

            # 验证安装
            $OpenCVPath = "C:\opencv"
            if (Test-Path $OpenCVPath) {
                Write-Host "[OK] OpenCV installed successfully at: $OpenCVPath" -ForegroundColor Green

                # 验证关键文件
                $keyFiles = @(
                    "$OpenCVPath\build\include\opencv2\opencv.hpp",
                    "$OpenCVPath\build\x64\vc16\lib\opencv_world*.lib"
                )

                $allFound = $true
                foreach ($pattern in $keyFiles) {
                    $files = Get-ChildItem $pattern -ErrorAction SilentlyContinue
                    if ($files) {
                        Write-Host "[OK] Found: $($files[0].FullName)" -ForegroundColor Green
                    } else {
                        Write-Host "[WARNING] Missing: $pattern" -ForegroundColor Yellow
                        $allFound = $false
                    }
                }

                if ($allFound) {
                    Write-Host "[OK] OpenCV installation verification passed" -ForegroundColor Green
                } else {
                    Write-Host "[WARNING] Some OpenCV files may be missing" -ForegroundColor Yellow
                }

                # 显示目录结构用于调试
                Write-Host "OpenCV directory structure:" -ForegroundColor Cyan
                Get-ChildItem $OpenCVPath -Directory | Select-Object -First 5 | ForEach-Object {
                    Write-Host "  [DIR] $($_.Name)" -ForegroundColor Gray
                }
            } else {
                throw "OpenCV directory not found after extraction"
            }

            # 清理安装包
            Remove-Item $OpenCVInstaller -Force -ErrorAction SilentlyContinue

        } catch {
            Write-Host "Failed to install OpenCV: $($_.Exception.Message)" -ForegroundColor Red
            Write-Host "OpenCV is optional for this build, continuing without it..." -ForegroundColor Yellow

            # 创建最小的opencv目录防止构建失败
            New-Item -ItemType Directory -Path "C:\opencv\build\include\opencv2" -Force | Out-Null
            $dummyContent = "// Dummy OpenCV header for builds without OpenCV"
            $dummyContent | Out-File -FilePath "C:\opencv\build\include\opencv2\opencv.hpp" -Encoding UTF8

            Write-Host "Created dummy OpenCV structure for build compatibility" -ForegroundColor Yellow
        }

        # 最终验证OpenCV安装（确保缓存状态正确）
        Write-Host "Final OpenCV verification..." -ForegroundColor Yellow
        $OpenCVPath = "C:\opencv"

        # 检查关键文件
        $criticalFiles = @(
            "$OpenCVPath\build\include\opencv2\opencv.hpp"
        )

        $opencvWorking = $true
        foreach ($file in $criticalFiles) {
            if (-not (Test-Path $file)) {
                $opencvWorking = $false
                Write-Host "[WARNING] OpenCV critical file missing: $file" -ForegroundColor Yellow
            }
        }

        if ($opencvWorking) {
            Write-Host "[OK] OpenCV final verification passed" -ForegroundColor Green
        } else {
            Write-Host "[WARNING] OpenCV installation incomplete, will use dummy structure" -ForegroundColor Yellow
        }

    - name: Configure OpenCV Environment
      shell: powershell
      run: |
        $OpenCVPath = "C:\opencv"
        if (Test-Path $OpenCVPath) {
            Write-Host "[OK] Configuring OpenCV environment..." -ForegroundColor Green

            # Set environment variable for later steps
            echo "OPENCV_DIR=C:\opencv\build" >> $env:GITHUB_ENV

            # Add OpenCV bin to PATH for runtime
            $OpenCVBinPath = "C:\opencv\build\x64\vc16\bin"
            if (Test-Path $OpenCVBinPath) {
                echo "$OpenCVBinPath" >> $env:GITHUB_PATH
                Write-Host "[OK] Added OpenCV bin to PATH: $OpenCVBinPath" -ForegroundColor Green
            }
        } else {
            Write-Host "[WARNING] OpenCV not found, building without OpenCV support" -ForegroundColor Yellow
        }

    # 步骤3: 缓存和安装MySQL Connector/C++
    # MySQL Connector/C++是MySQL官方的C++客户端库，用于数据库连接
    - name: Cache MySQL Connector
      uses: actions/cache@v4
      id: mysql-cache
      with:
        path: C:\mysql-connector
        key: ${{ runner.os }}-mysql-connector-9.4.0-v1
        restore-keys: |
          ${{ runner.os }}-mysql-connector-9.4.0
          ${{ runner.os }}-mysql-connector-8.0.33-v1
          ${{ runner.os }}-mysql-connector

    - name: Setup MySQL Connector/C++
      shell: powershell
      run: |
        Write-Host "Setting up MySQL Connector/C++..." -ForegroundColor Green

        # 检查是否已经安装（缓存命中）
        $MySQLPath = "C:\mysql-connector"
        if (Test-Path $MySQLPath) {
            Write-Host "[OK] MySQL Connector found in cache: $MySQLPath" -ForegroundColor Green

            # 快速验证缓存的关键文件
            $cacheValid = $true

            # 检查基本目录结构
            if (-not (Test-Path "$MySQLPath\include") -or (-not (Test-Path "$MySQLPath\lib64") -and -not (Test-Path "$MySQLPath\lib"))) {
                $cacheValid = $false
                Write-Host "[WARNING] Cache missing basic directory structure" -ForegroundColor Yellow
            }

            # 检查是否有任何头文件
            $hasHeaders = $false
            $quickHeaderCheck = @(
                "$MySQLPath\include\mysqlx\xapi.h",
                "$MySQLPath\include\mysql\mysql.h",
                "$MySQLPath\include\mysql.h"
            )
            foreach ($header in $quickHeaderCheck) {
                if (Test-Path $header) {
                    $hasHeaders = $true
                    Write-Host "[OK] Found cached header: $header" -ForegroundColor Green
                    break
                }
            }

            # 检查是否有任何库文件或DLL文件
            $hasLibs = $false
            $quickLibCheck = @(
                "$MySQLPath\lib64\mysqlcppconn8.lib",
                "$MySQLPath\lib64\mysqlcppconn.lib",
                "$MySQLPath\lib64\mysqlcppconn-10-vs14.lib",
                "$MySQLPath\lib64\vs14\mysqlcppconn.lib",
                "$MySQLPath\lib64\vs14\mysqlcppconnx.lib",
                "$MySQLPath\lib\mysqlcppconn8.lib"
            )
            foreach ($lib in $quickLibCheck) {
                if (Test-Path $lib) {
                    $hasLibs = $true
                    Write-Host "[OK] Found cached library: $lib" -ForegroundColor Green
                    break
                }
            }

            # 如果没有找到.lib文件，检查DLL文件
            if (-not $hasLibs) {
                $quickDllCheck = @(
                    "$MySQLPath\lib64\mysqlcppconn-10-vs14.dll",
                    "$MySQLPath\lib64\mysqlcppconnx-2-vs14.dll",
                    "$MySQLPath\bin\mysqlcppconn-10-vs14.dll"
                )
                foreach ($dll in $quickDllCheck) {
                    if (Test-Path $dll) {
                        $hasLibs = $true
                        Write-Host "[OK] Found cached DLL: $dll" -ForegroundColor Green
                        break
                    }
                }
            }

            if ($cacheValid -and $hasHeaders -and $hasLibs) {
                Write-Host "[OK] MySQL Connector cache validation passed" -ForegroundColor Green
                exit 0  # 成功退出，跳过下载
            } else {
                Write-Host "[WARNING] MySQL Connector cache incomplete, will re-download" -ForegroundColor Yellow
                Write-Host "  Cache valid: $cacheValid, Has headers: $hasHeaders, Has libs: $hasLibs" -ForegroundColor Gray
                Remove-Item $MySQLPath -Recurse -Force -ErrorAction SilentlyContinue
            }
        }

        Write-Host "Downloading MySQL Connector/C++..." -ForegroundColor Yellow

        try {
            # 使用MySQL官方预编译的Windows安装包
            Write-Host "Downloading MySQL Connector/C++ pre-built binaries..." -ForegroundColor Yellow
            # 使用最新版本的MySQL Connector/C++ 9.4.0
            $MySQLUrl = "https://dev.mysql.com/get/Downloads/Connector-C++/mysql-connector-c++-9.4.0-winx64.zip"
            $MySQLZip = "mysql-connector.zip"

            # 下载MySQL Connector（带重试机制）
            $maxRetries = 3
            $retryCount = 0
            $downloadSuccess = $false

            # 下载源列表（按优先级排序）
            $downloadSources = @(
                @{
                    url = "https://cdn.mysql.com/Downloads/Connector-C++/mysql-connector-c++-9.4.0-winx64.zip"
                    description = "MySQL CDN (9.4.0)"
                },
                @{
                    url = "https://dev.mysql.com/get/Downloads/Connector-C++/mysql-connector-c++-9.4.0-winx64.zip"
                    description = "MySQL Official (9.4.0)"
                },
                @{
                    url = "https://cdn.mysql.com/Downloads/Connector-C++/mysql-connector-c++-8.0.33-winx64.zip"
                    description = "MySQL CDN (8.0.33 fallback)"
                },
                @{
                    url = "https://dev.mysql.com/get/Downloads/Connector-C++/mysql-connector-c++-8.0.33-winx64.zip"
                    description = "MySQL Official (8.0.33 fallback)"
                },
                @{
                    url = "https://archive.mariadb.org/connector-c++-9.4.0/mysql-connector-c++-9.4.0-winx64.zip"
                    description = "MariaDB Archive Mirror (9.4.0)"
                },
                @{
                    url = "https://downloads.mysql.com/archives/get/p/19/file/mysql-connector-c%2B%2B-8.0.33-winx64.zip"
                    description = "MySQL Archives (8.0.33)"
                }
            )

            foreach ($source in $downloadSources) {
                if ($downloadSuccess) { break }
                Write-Host "Trying download from: $($source.description)" -ForegroundColor Yellow
                Write-Host "URL: $($source.url)" -ForegroundColor Gray

                $retryCount = 0
                while ($retryCount -lt $maxRetries -and -not $downloadSuccess) {
                    try {
                        Write-Host "Downloading MySQL Connector (attempt $($retryCount + 1)/$maxRetries)..." -ForegroundColor Yellow

                        # 使用更强健的下载参数
                        $webClient = New-Object System.Net.WebClient
                        $webClient.Headers.Add("User-Agent", "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36")
                        $webClient.DownloadFile($source.url, $MySQLZip)
                        # 验证下载文件大小
                        $fileSize = (Get-Item $MySQLZip).Length
                        Write-Host "Downloaded file size: $([math]::Round($fileSize / 1MB, 2)) MB" -ForegroundColor Yellow

                        if ($fileSize -lt 1MB) {
                            throw "Downloaded file too small, possibly corrupted"
                        }

                        $downloadSuccess = $true
                        break
                    } catch {
                        $retryCount++
                        Write-Host "Download attempt failed: $($_.Exception.Message)" -ForegroundColor Red
                        if ($retryCount -eq $maxRetries) {
                            Write-Host "Failed to download from $($source.description) after $maxRetries attempts" -ForegroundColor Red
                            break
                        }
                        Write-Host "Retrying in 10 seconds..." -ForegroundColor Yellow
                        Start-Sleep -Seconds 10
                    } finally {
                        if ($webClient) {
                            $webClient.Dispose()
                        }
                    }
                }
            }

            if (-not $downloadSuccess) {
                Write-Host "All primary sources failed. Trying final backup methods..." -ForegroundColor Yellow

                # 最后尝试：使用curl命令（通常更好的重定向处理）
                try {
                    $curlUrl = "https://dev.mysql.com/get/Downloads/Connector-C++/mysql-connector-c++-8.0.33-winx64.zip"
                    Write-Host "Trying with curl: $curlUrl" -ForegroundColor Yellow
                    & curl -L -o $MySQLZip $curlUrl --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"

                    if ($LASTEXITCODE -eq 0 -and (Test-Path $MySQLZip)) {
                        $fileSize = (Get-Item $MySQLZip).Length
                        if ($fileSize -gt 1MB) {
                            Write-Host "[OK] Successfully downloaded with curl: $([math]::Round($fileSize / 1MB, 2)) MB" -ForegroundColor Green
                            $downloadSuccess = $true
                        }
                    }
                } catch {
                    Write-Host "Curl download also failed: $($_.Exception.Message)" -ForegroundColor Red
                }
            }

            if (-not $downloadSuccess) {
                Write-Host "CRITICAL ERROR: Failed to download MySQL Connector from all sources" -ForegroundColor Red
                Write-Host "This includes:" -ForegroundColor Red
                foreach ($source in $downloadSources) {
                    Write-Host "  - $($source.description)" -ForegroundColor Red
                }
                Write-Host "  - Curl backup method" -ForegroundColor Red
                throw "MySQL Connector download failed - Build cannot continue"
            }

            # 解压MySQL Connector
            Write-Host "Extracting MySQL Connector..." -ForegroundColor Yellow
            New-Item -ItemType Directory -Path "C:\mysql-connector" -Force | Out-Null
            Expand-Archive -Path $MySQLZip -DestinationPath "C:\temp-mysql" -Force

            # 查找解压后的目录并移动到标准位置
            $extractedDir = Get-ChildItem "C:\temp-mysql" -Directory | Select-Object -First 1
            if ($extractedDir) {
                Write-Host "Moving MySQL Connector from $($extractedDir.FullName) to C:\mysql-connector..." -ForegroundColor Yellow
                Get-ChildItem $extractedDir.FullName | Move-Item -Destination "C:\mysql-connector" -Force
                Remove-Item "C:\temp-mysql" -Recurse -Force
            }

            # 验证安装
            $MySQLPath = "C:\mysql-connector"
            if (Test-Path $MySQLPath) {
                Write-Host "[OK] MySQL Connector installed successfully at: $MySQLPath" -ForegroundColor Green

                # 验证关键文件
                $keyFiles = @(
                    "$MySQLPath\include\mysqlx\xapi.h",
                    "$MySQLPath\include\mysql\mysql.h",
                    "$MySQLPath\lib64\mysqlcppconn8.lib"
                )

                $allFound = $true
                foreach ($file in $keyFiles) {
                    if (Test-Path $file) {
                        Write-Host "[OK] Found: $file" -ForegroundColor Green
                    } else {
                        Write-Host "[WARNING] Missing: $file" -ForegroundColor Yellow
                        $allFound = $false
                    }
                }

                if ($allFound) {
                    Write-Host "[OK] MySQL Connector installation verification passed" -ForegroundColor Green
                } else {
                    Write-Host "[WARNING] Some MySQL Connector files may be missing" -ForegroundColor Yellow
                }

                # 显示详细目录结构用于调试
                Write-Host "MySQL Connector directory structure:" -ForegroundColor Cyan
                Get-ChildItem $MySQLPath -Directory | ForEach-Object {
                    Write-Host "  [DIR] $($_.Name)" -ForegroundColor Gray

                    # 显示重要子目录的内容
                    if ($_.Name -eq "include") {
                        Write-Host "    Include subdirectories:" -ForegroundColor Gray
                        Get-ChildItem $_.FullName -Directory -ErrorAction SilentlyContinue | ForEach-Object {
                            Write-Host "      [DIR] $($_.Name)" -ForegroundColor DarkGray
                        }
                        Write-Host "    Include files:" -ForegroundColor Gray
                        Get-ChildItem $_.FullName -File -ErrorAction SilentlyContinue | Select-Object -First 5 | ForEach-Object {
                            Write-Host "      [FILE] $($_.Name)" -ForegroundColor DarkGray
                        }
                    }
                    if ($_.Name -eq "lib64" -or $_.Name -eq "lib") {
                        Write-Host "    $($_.Name) files:" -ForegroundColor Gray
                        Get-ChildItem $_.FullName -File -ErrorAction SilentlyContinue | ForEach-Object {
                            Write-Host "      [FILE] $($_.Name)" -ForegroundColor DarkGray
                        }
                        # 检查子目录
                        Get-ChildItem $_.FullName -Directory -ErrorAction SilentlyContinue | ForEach-Object {
                            Write-Host "      [DIR] $($_.Name)/" -ForegroundColor DarkGray
                            Get-ChildItem $_.FullName -File -ErrorAction SilentlyContinue | ForEach-Object {
                                Write-Host "        [FILE] $($_.Name)" -ForegroundColor DarkGray
                            }
                        }
                    }
                }
            } else {
                throw "MySQL Connector directory not found after extraction"
            }

            # 清理下载文件
            Remove-Item $MySQLZip -Force -ErrorAction SilentlyContinue

        } catch {
            Write-Host "CRITICAL ERROR: Failed to install MySQL Connector: $($_.Exception.Message)" -ForegroundColor Red
            Write-Host "MySQL Connector is REQUIRED for this project!" -ForegroundColor Red
            throw "MySQL Connector installation failed - Build cannot continue"
        }

        # 最终验证MySQL安装
        Write-Host "Verifying MySQL Connector installation..." -ForegroundColor Yellow
        $MySQLPath = "C:\mysql-connector"

        # 检查MySQL Connector文件结构和必需文件
        Write-Host "Analyzing MySQL Connector file structure..." -ForegroundColor Yellow

        # 可能的头文件位置
        $possibleHeaders = @(
            "$MySQLPath\include\mysqlx\xapi.h",
            "$MySQLPath\include\mysql\mysql.h",
            "$MySQLPath\include\mysql.h",
            "$MySQLPath\include\jdbc\mysql_connection.h"
        )

        # 可能的库文件位置（.lib导入库和.dll动态库）
        $possibleLibs = @(
            "$MySQLPath\lib64\mysqlcppconn8.lib",
            "$MySQLPath\lib64\mysqlcppconn.lib",
            "$MySQLPath\lib64\mysqlcppconn-10-vs14.lib",
            "$MySQLPath\lib64\mysqlcppconnx-2-vs14.lib",
            "$MySQLPath\lib64\vs14\mysqlcppconn.lib",
            "$MySQLPath\lib64\vs14\mysqlcppconnx.lib",
            "$MySQLPath\lib64\vs14\mysqlcppconn-static.lib",
            "$MySQLPath\lib64\vs14\mysqlcppconnx-static.lib",
            "$MySQLPath\lib64\mysql.lib",
            "$MySQLPath\lib64\libmysql.lib",
            "$MySQLPath\lib\mysqlcppconn8.lib",
            "$MySQLPath\lib\mysqlcppconn.lib",
            "$MySQLPath\lib\mysqlcppconn-10-vs14.lib",
            "$MySQLPath\lib\mysqlcppconnx-2-vs14.lib"
        )

        # 可能的DLL文件位置（作为备用验证）
        $possibleDLLs = @(
            "$MySQLPath\lib64\mysqlcppconn-10-vs14.dll",
            "$MySQLPath\lib64\mysqlcppconnx-2-vs14.dll",
            "$MySQLPath\bin\mysqlcppconn-10-vs14.dll",
            "$MySQLPath\bin\mysqlcppconnx-2-vs14.dll"
        )

        # 查找实际存在的文件
        $foundHeaders = @()
        $foundLibs = @()
        $foundDLLs = @()

        foreach ($header in $possibleHeaders) {
            if (Test-Path $header) {
                $foundHeaders += $header
                Write-Host "[OK] Found header: $header" -ForegroundColor Green
            }
        }

        foreach ($lib in $possibleLibs) {
            if (Test-Path $lib) {
                $foundLibs += $lib
                Write-Host "[OK] Found library: $lib" -ForegroundColor Green
            }
        }

        foreach ($dll in $possibleDLLs) {
            if (Test-Path $dll) {
                $foundDLLs += $dll
                Write-Host "[OK] Found DLL: $dll" -ForegroundColor Green
            }
        }

        # 验证安装的完整性
        $installationValid = $true
        $issues = @()

        # 必须至少有一个头文件
        if ($foundHeaders.Count -eq 0) {
            $issues += "No MySQL header files found"
            $installationValid = $false
        }

        # 必须至少有一个库文件或DLL文件
        if ($foundLibs.Count -eq 0 -and $foundDLLs.Count -eq 0) {
            $issues += "No MySQL library files (.lib) or DLL files found"
            $installationValid = $false
        } elseif ($foundLibs.Count -eq 0 -and $foundDLLs.Count -gt 0) {
            Write-Host "[INFO] No .lib files found, but found DLL files. This might be a DLL-only distribution." -ForegroundColor Yellow
            Write-Host "[INFO] Will attempt to create import libraries or use dynamic linking." -ForegroundColor Yellow

            # 尝试使用lib.exe创建导入库（如果可用）
            $libExePath = $null
            try {
                $libExePath = (Get-Command lib.exe -ErrorAction SilentlyContinue).Source
            } catch {
                # lib.exe not found in PATH
            }
            if ($libExePath) {
                Write-Host "[INFO] Found lib.exe, attempting to create import libraries..." -ForegroundColor Yellow

                foreach ($dll in $foundDLLs) {
                    $dllName = [System.IO.Path]::GetFileNameWithoutExtension($dll)
                    $libFile = [System.IO.Path]::ChangeExtension($dll, ".lib")

                    try {
                        # 使用lib.exe创建导入库
                        $libArgs = "/DEF /OUT:$libFile /MACHINE:X64"
                        Write-Host "Creating import library for $dllName..." -ForegroundColor Gray
                        & lib /MACHINE:X64 "/DEF:$dll" "/OUT:$libFile" 2>$null

                        if (Test-Path $libFile) {
                            $foundLibs += $libFile
                            Write-Host "[OK] Created import library: $libFile" -ForegroundColor Green
                        }
                    } catch {
                        Write-Host "[WARNING] Failed to create import library for $dllName" -ForegroundColor Yellow
                    }
                }
            } else {
                Write-Host "[INFO] lib.exe not found, will use DLL files directly" -ForegroundColor Yellow
                # 将DLL文件添加到库列表中作为备用
                $foundLibs += $foundDLLs
            }
        }

        # 检查include目录是否存在
        if (-not (Test-Path "$MySQLPath\include")) {
            $issues += "Include directory missing"
            $installationValid = $false
        }

        # 检查lib目录是否存在（lib64或lib）
        if (-not (Test-Path "$MySQLPath\lib64") -and -not (Test-Path "$MySQLPath\lib")) {
            $issues += "Library directory missing (neither lib64 nor lib found)"
            $installationValid = $false
        }

        if (-not $installationValid) {
            Write-Host "CRITICAL ERROR: MySQL Connector installation incomplete!" -ForegroundColor Red
            Write-Host "Issues found:" -ForegroundColor Red
            foreach ($issue in $issues) {
                Write-Host "  - $issue" -ForegroundColor Red
            }
            Write-Host "Found headers: $($foundHeaders.Count)" -ForegroundColor Yellow
            Write-Host "Found libraries: $($foundLibs.Count)" -ForegroundColor Yellow
            Write-Host "Found DLLs: $($foundDLLs.Count)" -ForegroundColor Yellow
            throw "MySQL Connector verification failed - Installation incomplete"
        }

        Write-Host "[OK] MySQL Connector installation verified successfully" -ForegroundColor Green
        Write-Host "Summary: $($foundHeaders.Count) headers, $($foundLibs.Count) libraries, $($foundDLLs.Count) DLLs" -ForegroundColor Green

    - name: Configure MySQL Environment
      shell: powershell
      run: |
        $MySQLPath = "C:\mysql-connector"

        # MySQL必须存在
        if (-not (Test-Path $MySQLPath)) {
            throw "CRITICAL ERROR: MySQL Connector not found at $MySQLPath - This should not happen!"
        }

        Write-Host "[OK] Configuring MySQL Connector environment..." -ForegroundColor Green

        # 设置MySQL环境变量供后续步骤使用
        echo "MYSQL_DIR=$MySQLPath" >> $env:GITHUB_ENV

        # 添加MySQL lib目录到PATH
        $MySQLBinPath = "$MySQLPath\lib64"
        if (Test-Path $MySQLBinPath) {
            echo "$MySQLBinPath" >> $env:GITHUB_PATH
            Write-Host "[OK] Added MySQL lib64 to PATH: $MySQLBinPath" -ForegroundColor Green
        } else {
            throw "CRITICAL ERROR: MySQL lib64 directory not found at $MySQLBinPath"
        }

    # 步骤4: 使用vcpkg安装LibSSH
    # LibSSH是SSH客户端库，用于SSH连接和SFTP文件传输
    - name: Cache vcpkg LibSSH
      uses: actions/cache@v4
      id: vcpkg-cache
      with:
        path: |
          C:/vcpkg/installed/x64-windows
          C:/vcpkg/downloads
        key: ${{ runner.os }}-vcpkg-libssh-${{ hashFiles('**/vcpkg.json', '**/vcpkg-configuration.json') }}-v2
        restore-keys: |
          ${{ runner.os }}-vcpkg-libssh-v2
          ${{ runner.os }}-vcpkg-libssh
          ${{ runner.os }}-vcpkg-v2

    - name: Setup vcpkg and install LibSSH
      shell: powershell
      run: |
        Write-Host "Setting up vcpkg and installing LibSSH..." -ForegroundColor Green

        # 检查vcpkg是否已存在
        $VcpkgPath = "C:\vcpkg"
        if (-not (Test-Path "$VcpkgPath\vcpkg.exe")) {
            Write-Host "Installing vcpkg..." -ForegroundColor Yellow

            # 克隆vcpkg（如果不存在）
            if (-not (Test-Path $VcpkgPath)) {
                git clone https://github.com/microsoft/vcpkg.git $VcpkgPath
            }

            # 运行bootstrap脚本
            & "$VcpkgPath\bootstrap-vcpkg.bat" -disableMetrics

            if ($LASTEXITCODE -ne 0) {
                throw "vcpkg bootstrap failed"
            }
        } else {
            Write-Host "[OK] vcpkg already installed" -ForegroundColor Green
        }

        # 检查LibSSH是否已安装
        $LibSSHIncludePath = "$env:VCPKG_INSTALLED_DIR\include\libssh\libssh.h"
        $LibSSHLibPath = "$env:VCPKG_INSTALLED_DIR\lib\ssh.lib"

        if ((Test-Path $LibSSHIncludePath) -and (Test-Path $LibSSHLibPath)) {
            Write-Host "[OK] LibSSH already installed via vcpkg" -ForegroundColor Green
        } else {
            Write-Host "Installing LibSSH via vcpkg..." -ForegroundColor Yellow

            # 设置vcpkg三元组
            $triplet = "x64-windows"

            # 安装LibSSH
            & "$VcpkgPath\vcpkg.exe" install libssh:$triplet

            if ($LASTEXITCODE -ne 0) {
                Write-Host "[ERROR] LibSSH installation failed" -ForegroundColor Red
                throw "vcpkg install libssh failed"
            }

            Write-Host "[OK] LibSSH installed successfully" -ForegroundColor Green
        }

        # 验证安装结果
        Write-Host "Verifying LibSSH installation..." -ForegroundColor Yellow

        $verificationPaths = @(
            @{ Path = "$env:VCPKG_INSTALLED_DIR\include\libssh\libssh.h"; Type = "Header" },
            @{ Path = "$env:VCPKG_INSTALLED_DIR\lib\ssh.lib"; Type = "Library" },
            @{ Path = "$env:VCPKG_INSTALLED_DIR\bin\ssh.dll"; Type = "DLL" }
        )

        $allFound = $true
        foreach ($item in $verificationPaths) {
            if (Test-Path $item.Path) {
                Write-Host "[OK] Found $($item.Type): $($item.Path)" -ForegroundColor Green
            } else {
                Write-Host "[WARNING] Missing $($item.Type): $($item.Path)" -ForegroundColor Yellow
                if ($item.Type -ne "DLL") {  # DLL可能在不同位置，不是关键错误
                    $allFound = $false
                }
            }
        }

        if ($allFound) {
            Write-Host "[OK] LibSSH installation verification passed" -ForegroundColor Green
        } else {
            Write-Host "[WARNING] Some LibSSH components missing, but continuing..." -ForegroundColor Yellow
        }

        # 设置CMake变量
        echo "CMAKE_PREFIX_PATH=$env:VCPKG_INSTALLED_DIR" >> $env:GITHUB_ENV
        echo "VCPKG_TARGET_TRIPLET=x64-windows" >> $env:GITHUB_ENV

        Write-Host "[OK] LibSSH setup completed via vcpkg" -ForegroundColor Green

    # 步骤5: 安装Qt开发框架
    # Qt是GUI应用程序的核心依赖，包含界面组件和多媒体功能
    - name: Setup Qt
      uses: jurplel/install-qt-action@v3    # 使用第三方Action安装Qt
      with:
        version: ${{ env.QT_VERSION_WINDOWS }} # Windows Qt版本（6.9.1）
        host: windows                        # 主机系统
        target: desktop                      # 目标平台（桌面应用）
        arch: win64_msvc2022_64             # 架构（64位Windows + MSVC2022）
        tools: 'tools_ifw'                  # Qt安装框架工具（用于创建安装包）
        modules: 'qtwebengine qtmultimedia' # 额外模块（Web引擎 + 多媒体）
        cache: true                          # 启用缓存加速后续构建
        
    - name: Debug Qt installation
      shell: powershell
      run: |
        Write-Host "=== Qt Installation Debug ===" -ForegroundColor Cyan
        Write-Host "Environment Variables:" -ForegroundColor Yellow
        Write-Host "Qt6_DIR: $env:Qt6_DIR" -ForegroundColor Yellow
        Write-Host "QT_ROOT_DIR: $env:QT_ROOT_DIR" -ForegroundColor Yellow
        Write-Host "RUNNER_WORKSPACE: $env:RUNNER_WORKSPACE" -ForegroundColor Yellow
        Write-Host "GITHUB_WORKSPACE: $env:GITHUB_WORKSPACE" -ForegroundColor Yellow
        Write-Host "QT_VERSION: ${{ env.QT_VERSION }}" -ForegroundColor Yellow
        
        Write-Host "All Qt-related environment variables:" -ForegroundColor Cyan
        Get-ChildItem Env: | Where-Object { $_.Name -match "qt|Qt|QT" } | ForEach-Object {
            Write-Host "$($_.Name) = $($_.Value)" -ForegroundColor Gray
        }
        
        Write-Host "Checking possible Qt paths:" -ForegroundColor Cyan
        $Path1 = Join-Path $env:RUNNER_WORKSPACE "Qt\${{ env.QT_VERSION }}\msvc2022_64"
        $Path2 = "C:\Qt\${{ env.QT_VERSION }}\msvc2022_64"
        $Path3 = Join-Path $env:GITHUB_WORKSPACE "..\Qt\${{ env.QT_VERSION }}\msvc2022_64"
        
        Write-Host "Path 1: $Path1" -ForegroundColor Green
        if (Test-Path $Path1) {
            Write-Host "  Found!" -ForegroundColor Green
        } else {
            Write-Host "  Not found" -ForegroundColor Red
        }
        
        Write-Host "Path 2: $Path2" -ForegroundColor Green
        if (Test-Path $Path2) {
            Write-Host "  Found!" -ForegroundColor Green
        } else {
            Write-Host "  Not found" -ForegroundColor Red
        }
        
        Write-Host "Path 3: $Path3" -ForegroundColor Green
        if (Test-Path $Path3) {
            Write-Host "  Found!" -ForegroundColor Green
        } else {
            Write-Host "  Not found" -ForegroundColor Red
        }
        
        $QtWorkspaceDir = Join-Path $env:RUNNER_WORKSPACE "Qt"
        Write-Host "Checking RUNNER_WORKSPACE Qt directory: $QtWorkspaceDir" -ForegroundColor Green
        if (Test-Path $QtWorkspaceDir) {
            Write-Host "Found Qt directory" -ForegroundColor Green
            Get-ChildItem $QtWorkspaceDir | ForEach-Object { 
                Write-Host "  $($_.Name)" -ForegroundColor Gray 
            }
            
            # Check for Tools directory
            $QtToolsDir = Join-Path $QtWorkspaceDir "Tools"
            Write-Host "Checking Qt Tools directory: $QtToolsDir" -ForegroundColor Green
            if (Test-Path $QtToolsDir) {
                Write-Host "Found Qt Tools directory" -ForegroundColor Green
                Get-ChildItem $QtToolsDir | ForEach-Object { 
                    Write-Host "  Tools/$($_.Name)" -ForegroundColor Gray 
                }
                
                # Check specifically for QtInstallerFramework
                $IFWDir = Join-Path $QtToolsDir "QtInstallerFramework"
                if (Test-Path $IFWDir) {
                    Write-Host "Found QtInstallerFramework directory" -ForegroundColor Green
                    Get-ChildItem $IFWDir | ForEach-Object { 
                        Write-Host "  QtInstallerFramework/$($_.Name)" -ForegroundColor Gray 
                    }
                } else {
                    Write-Host "QtInstallerFramework directory not found" -ForegroundColor Yellow
                }
            } else {
                Write-Host "Qt Tools directory not found" -ForegroundColor Yellow
            }
        } else {
            Write-Host "No Qt directory found" -ForegroundColor Red
        }
        
    # 步骤3: 设置Microsoft Visual C++编译器
    # MSVC是Windows平台的主要C++编译器，用于编译Qt应用程序
    - name: Setup MSVC
      uses: microsoft/setup-msbuild@v2    # 微软官方Action
      
    # 步骤5: 安装CMake构建系统和Ninja构建工具
    # CMake: 跨平台构建系统，生成构建文件
    # Ninja: 快速的并行构建工具，比MSBuild更高效
    - name: Setup CMake and Ninja
      uses: lukka/get-cmake@latest        # 获取最新CMake和Ninja
      with:
        cmakeVersion: ${{ env.CMAKE_VERSION }}  # 指定CMake版本
        ninjaVersion: latest                    # 使用最新Ninja版本
        
    # 步骤5: 缓存vcpkg包管理器
    # vcpkg是微软的C++包管理器，用于安装redis-plus-plus等第三方库
    # 缓存可以显著减少构建时间（从15分钟减少到2分钟）
    - name: Cache vcpkg
      uses: actions/cache@v4
      id: vcpkg-redis-cache
      with:
        path: |
          C:\vcpkg
          !C:\vcpkg\.git
          !C:\vcpkg\buildtrees
          !C:\vcpkg\downloads
        key: ${{ runner.os }}-vcpkg-redis-v3-${{ hashFiles('**/vcpkg.json', '**/CMakeLists.txt') }}
        restore-keys: |
          ${{ runner.os }}-vcpkg-redis-v2
          ${{ runner.os }}-vcpkg-redis
          ${{ runner.os }}-vcpkg
          
    # 步骤6: 安装vcpkg和数据库依赖（仅在缓存未命中时执行）
    # Redis-plus-plus: C++ Redis客户端库，用于Redis数据库连接功能
    # libmysql: MySQL客户端库，用于MySQL数据库连接功能
    - name: Setup vcpkg and dependencies
      if: steps.vcpkg-redis-cache.outputs.cache-hit != 'true'        # 仅在缓存未命中时运行
      shell: powershell
      run: |
        Write-Host "Setting up vcpkg and dependencies..." -ForegroundColor Green
        
        # 克隆并初始化vcpkg
        Write-Host "Installing vcpkg..." -ForegroundColor Yellow
        git clone https://github.com/Microsoft/vcpkg.git C:\vcpkg
        cd C:\vcpkg
        .\bootstrap-vcpkg.bat    # 构建vcpkg工具
        
        # 安装Redis C++客户端库
        Write-Host "Installing redis-plus-plus..." -ForegroundColor Yellow
        .\vcpkg.exe install redis-plus-plus:x64-windows    # 安装64位Windows版本

        # 注意：MySQL Connector现在通过官方预编译包安装，不再使用vcpkg编译

        Write-Host "vcpkg dependencies installed successfully!" -ForegroundColor Green
        
    # 步骤7: 设置vcpkg环境变量
    # 这些环境变量将在后续的CMake配置中使用
    - name: Set vcpkg environment
      shell: powershell
      run: |
        # 设置vcpkg根目录和安装目录环境变量
        echo "VCPKG_ROOT=C:\vcpkg" >> $env:GITHUB_ENV
        echo "VCPKG_INSTALLED_DIR=C:\vcpkg\installed\x64-windows" >> $env:GITHUB_ENV
        
    # 统一缓存构建工具和依赖（除了已单独缓存的项目）
    - name: Cache Build Tools
      uses: actions/cache@v4
      with:
        path: |
          ${{ runner.workspace }}/Qt
          C:/Qt
        key: ${{ runner.os }}-qt-${{ env.QT_VERSION_WINDOWS }}-build-tools-v3
        restore-keys: |
          ${{ runner.os }}-qt-${{ env.QT_VERSION_WINDOWS }}
          ${{ runner.os }}-qt

    # 缓存状态报告
    - name: Cache Status Report
      shell: powershell
      run: |
        Write-Host "=== Cache Status Report ===" -ForegroundColor Cyan

        # Npcap SDK 缓存状态
        $npcapCacheHit = "${{ steps.npcap-cache.outputs.cache-hit }}"
        if ($npcapCacheHit -eq "true") {
            Write-Host "[OK] Npcap SDK: Cache Hit" -ForegroundColor Green
        } else {
            Write-Host "[DOWNLOAD] Npcap SDK: Cache Miss, Re-downloading" -ForegroundColor Yellow
        }

        # OpenCV 缓存状态
        $opencvCacheHit = "${{ steps.opencv-cache.outputs.cache-hit }}"
        if ($opencvCacheHit -eq "true") {
            Write-Host "[OK] OpenCV: Cache Hit" -ForegroundColor Green
        } else {
            Write-Host "[DOWNLOAD] OpenCV: Cache Miss, Re-downloading" -ForegroundColor Yellow
        }

        # MySQL Connector 缓存状态
        $mysqlCacheHit = "${{ steps.mysql-cache.outputs.cache-hit }}"
        if ($mysqlCacheHit -eq "true") {
            Write-Host "[OK] MySQL Connector: Cache Hit" -ForegroundColor Green
        } else {
            Write-Host "[DOWNLOAD] MySQL Connector: Cache Miss, Re-downloading" -ForegroundColor Yellow
        }

        # vcpkg 缓存状态
        $vcpkgCacheHit = "${{ steps.vcpkg-redis-cache.outputs.cache-hit }}"
        if ($vcpkgCacheHit -eq "true") {
            Write-Host "[OK] vcpkg: Cache Hit" -ForegroundColor Green
        } else {
            Write-Host "[DOWNLOAD] vcpkg: Cache Miss, Rebuilding" -ForegroundColor Yellow
        }

        # 显示缓存大小估算
        Write-Host "`n=== Estimated Download Time Savings ===" -ForegroundColor Cyan
        if ($npcapCacheHit -eq "true") {
            Write-Host "Npcap SDK: save ~30 seconds" -ForegroundColor Green
        }
        if ($opencvCacheHit -eq "true") {
            Write-Host "OpenCV: save ~2-5 minutes" -ForegroundColor Green
        }
        if ($mysqlCacheHit -eq "true") {
            Write-Host "MySQL Connector: save ~1-2 minutes" -ForegroundColor Green
        }
        if ($vcpkgCacheHit -eq "true") {
            Write-Host "vcpkg dependencies: save ~5-8 minutes" -ForegroundColor Green
        }

    - name: Set version
      id: version
      shell: powershell
      run: |
        $version = "${{ github.event.inputs.version }}"
        if ([string]::IsNullOrEmpty($version)) {
            if ("${{ github.ref }}" -like "refs/tags/v*") {
                $version = "${{ github.ref_name }}".Substring(1)
            } else {
                $version = "1.0.${{ github.run_number }}"
            }
        }
        Write-Host "Version: $version"
        echo "version=$version" >> $env:GITHUB_OUTPUT
        
    - name: Build project
      id: build
      shell: powershell
      run: |
        Write-Host "=== GitHub Actions Build Script ===" -ForegroundColor Cyan
        Write-Host "Build Type: Release" -ForegroundColor Yellow
        
        # Find Qt installation - prioritize environment variables from install-qt-action
        $QtPath = $env:Qt6_DIR
        if (-not $QtPath) {
            $QtPath = $env:QT_ROOT_DIR
        }
        if (-not $QtPath) {
            # Fallback to common paths
            $PossiblePaths = @(
                (Join-Path $env:RUNNER_WORKSPACE "Qt\${{ env.QT_VERSION }}\msvc2022_64"),
                "C:\Qt\${{ env.QT_VERSION }}\msvc2022_64",
                (Join-Path $env:GITHUB_WORKSPACE "..\Qt\${{ env.QT_VERSION }}\msvc2022_64")
            )
            foreach ($Path in $PossiblePaths) {
                if (Test-Path $Path) {
                    $QtPath = $Path
                    break
                }
            }
        }
        
        if (-not $QtPath -or -not (Test-Path $QtPath)) {
            Write-Host "ERROR: Qt installation not found!" -ForegroundColor Red
            Write-Host "Checked paths:" -ForegroundColor Yellow
            Write-Host "  Qt6_DIR: $env:Qt6_DIR" -ForegroundColor Yellow
            Write-Host "  QT_ROOT_DIR: $env:QT_ROOT_DIR" -ForegroundColor Yellow
            throw "Qt installation not found!"
        }
        
        Write-Host "Qt Path: $QtPath" -ForegroundColor Cyan
        
        # Find OpenCV installation
        $OpenCVPath = $env:OPENCV_DIR
        if (-not $OpenCVPath) {
            $OpenCVPath = "C:\opencv\build"
        }
        
        Write-Host "OpenCV Path: $OpenCVPath" -ForegroundColor Cyan
        
        # Project paths
        $ProjectRoot = Get-Location
        $BuildDir = Join-Path $ProjectRoot "build"
        
        Write-Host "Project Root: $ProjectRoot" -ForegroundColor Cyan
        Write-Host "Build Directory: $BuildDir" -ForegroundColor Cyan
        
        # 构建步骤1: 准备构建环境
        # 清理旧的构建目录，创建新的构建环境
        Write-Host "`nStep 1: Building project..." -ForegroundColor Green
        
        # 清理旧的构建目录（如果存在）
        if (Test-Path $BuildDir) {
            Remove-Item -Recurse -Force $BuildDir
        }
        
        # 创建新的构建目录并进入
        New-Item -ItemType Directory -Path $BuildDir | Out-Null
        Set-Location $BuildDir
        
        Write-Host "Configuring project..." -ForegroundColor Yellow
        
        # 构建步骤2: 配置CMake路径和依赖
        # 设置CMAKE_PREFIX_PATH，让CMake能找到Qt、OpenCV和vcpkg
        $CMakePrefixPath = $QtPath
        if (Test-Path $OpenCVPath) {
            $CMakePrefixPath = "$QtPath;$OpenCVPath"    # 包含OpenCV路径
            Write-Host "Using OpenCV: $OpenCVPath" -ForegroundColor Green
        } else {
            Write-Host "OpenCV not found, building without OpenCV support" -ForegroundColor Yellow
        }
        
        # 检查vcpkg安装状态
        # vcpkg提供Redis-plus-plus库，是数据库功能的核心依赖
        $VcpkgPath = "C:\vcpkg"
        $VcpkgToolchain = ""
        if ($VcpkgPath -and (Test-Path $VcpkgPath)) {
            $VcpkgToolchain = "$VcpkgPath\scripts\buildsystems\vcpkg.cmake"
            Write-Host "Using vcpkg: $VcpkgPath" -ForegroundColor Green
            Write-Host "Vcpkg toolchain: $VcpkgToolchain" -ForegroundColor Green
        } else {
            Write-Host "vcpkg not found, building without Redis support" -ForegroundColor Yellow
        }
        # $npcapDir = "$env:GITHUB_WORKSPACE\npcap-sdk\npcap-sdk-1.15"
        # 不带npcap-sdk-1.15才是对的目录
        $npcapDir = "$env:GITHUB_WORKSPACE\npcap-sdk"
        # 打印$npcapDir是否存在
        if (Test-Path $npcapDir -PathType Container) {
            Write-Host "Npcap SDK directory exists: $npcapDir"
        } else {
            Write-Error "Npcap SDK directory NOT found: $npcapDir"
            exit 1
        }
        
        # 打印日志
        Write-Host "CMAKE_PREFIX_PATH: $CMakePrefixPath" -ForegroundColor Cyan
        # 构建步骤3: 配置CMake构建系统
        # 根据可用依赖动态配置编译选项
        
        $CMakeArgs = @(
            $ProjectRoot,                                                           # 项目源码路径
            "-G", "Visual Studio 17 2022",                                          # 使用VS2022生成器
            "-A", "x64",                                                            # 64位架构
            "-DCMAKE_PREFIX_PATH=$CMakePrefixPath",                                 # Qt / OpenCV / vcpkg 路径
            "-DPCAP_INCLUDE_DIR=$npcapDir\Include",                                 # Npcap Include
            "-DPCAP_LIBRARY=$npcapDir\Lib\x64\wpcap.lib",                           # Npcap wpcap.lib
            "-DPACKET_LIBRARY=$npcapDir\Lib\x64\packet.lib",                        # Packet.lib
            "-DENVIRONMENT=prod"                                                    # 环境
        )
        
        # 配置Redis支持（如果vcpkg可用）
        if ($VcpkgToolchain -and (Test-Path $VcpkgToolchain)) {
            $CMakeArgs += "-DCMAKE_TOOLCHAIN_FILE=$VcpkgToolchain"  # 使用vcpkg工具链
            $CMakeArgs += "-DENABLE_REDIS=ON"                       # 启用Redis功能
        } else {
            $CMakeArgs += "-DENABLE_REDIS=OFF"                      # 禁用Redis功能
        }
        
        # 配置OpenCV支持（如果可用）
        if (Test-Path $OpenCVPath) {
            $CMakeArgs += "-DWITH_OPENCV=ON"                        # 启用OpenCV功能
        } else {
            $CMakeArgs += "-DWITH_OPENCV=OFF"                       # 禁用OpenCV功能
        }

        # 配置MySQL支持（必需）
        $MySQLPath = "C:\mysql-connector"

        # 验证MySQL Connector存在
        if (-not (Test-Path $MySQLPath)) {
            throw "CRITICAL ERROR: MySQL Connector not found at $MySQLPath - Build cannot continue"
        }

        Write-Host "Configuring MySQL Connector for CMake..." -ForegroundColor Green
        $CMakeArgs += "-DWITH_MYSQL=ON"                             # 启用MySQL功能（必需）
        $CMakeArgs += "-DMYSQL_INCLUDE_DIR=$MySQLPath\include"      # MySQL头文件路径
        $CMakeArgs += "-DMYSQL_LIB_DIR=$MySQLPath\lib64"            # MySQL库路径
        $CMakeArgs += "-DMYSQL_ROOT_DIR=$MySQLPath"                 # MySQL根目录
        Write-Host "[OK] MySQL Connector configured at: $MySQLPath" -ForegroundColor Green
        
        Write-Host "Running cmake with args: $($CMakeArgs -join ' ')" -ForegroundColor Yellow
        & cmake @CMakeArgs    # 执行CMake配置
        
        if ($LASTEXITCODE -ne 0) {
            throw "Project configuration failed!"
        }
        
        Write-Host "Compiling project..." -ForegroundColor Yellow
        & cmake --build . --config Release --parallel
        
        if ($LASTEXITCODE -ne 0) {
            throw "Project compilation failed!"
        }
        
        Write-Host "OK Project build successful!" -ForegroundColor Green
        
        # Step 2: Find executable
        Write-Host "`nStep 2: Finding executable file..." -ForegroundColor Green
        
        $ExeFile = Get-ChildItem -Path "$BuildDir\Release" -Filter "*.exe" -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -like "*lele*" -or $_.Name -like "*tools*" } |
            Where-Object { $_.Name -notlike "*Installer*" } |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
        
        # If not found in Release, try Debug or root build directory
        if (-not $ExeFile) {
            $ExeFile = Get-ChildItem -Path "$BuildDir\Debug" -Filter "*.exe" -ErrorAction SilentlyContinue |
                Where-Object { $_.Name -like "*lele*" -or $_.Name -like "*tools*" } |
                Where-Object { $_.Name -notlike "*Installer*" } |
                Sort-Object LastWriteTime -Descending |
                Select-Object -First 1
        }
        
        if (-not $ExeFile) {
            $ExeFile = Get-ChildItem -Path $BuildDir -Filter "*.exe" -Recurse |
                Where-Object { $_.Name -like "*lele*" -or $_.Name -like "*tools*" } |
                Where-Object { $_.Name -notlike "*Installer*" } |
                Sort-Object LastWriteTime -Descending |
                Select-Object -First 1
        }
        
        if (-Not $ExeFile) {
            throw "Executable file not found!"
        }
        
        Write-Host "Found executable file: $($ExeFile.FullName)" -ForegroundColor Green
        
        # Step 3: Deploy Qt dependencies
        Write-Host "`nStep 3: Deploying Qt dependencies..." -ForegroundColor Green
        
        $Windeployqt = "$QtPath/bin/windeployqt.exe"
        if (-Not (Test-Path $Windeployqt)) {
            throw "windeployqt.exe not found!"
        }
        
        Write-Host "Running windeployqt..." -ForegroundColor Yellow
        & $Windeployqt --release --no-translations --no-system-d3d-compiler --no-opengl-sw $ExeFile.FullName
        
        Write-Host "OK Qt dependencies deployed!" -ForegroundColor Green
        
        # Set output variables for GitHub Actions
        $ExeDir = $ExeFile.DirectoryName
        $ExeName = $ExeFile.Name
        
        echo "exe_path=$($ExeFile.FullName)" >> $env:GITHUB_OUTPUT
        echo "exe_dir=$ExeDir" >> $env:GITHUB_OUTPUT
        echo "exe_name=$ExeName" >> $env:GITHUB_OUTPUT
        echo "build_dir=$BuildDir" >> $env:GITHUB_OUTPUT
        
        Write-Host "`nBuild completed successfully!" -ForegroundColor Green
        
        Set-Location $ProjectRoot
        
    - name: Create installer
      id: create_installer
      if: github.event_name != 'pull_request'
      shell: powershell
      run: |
        # Run the original installer creation logic
        Write-Host "Creating installer package..." -ForegroundColor Green
        
        # Use the logic from your build.ps1 script here
        $Version = "${{ steps.version.outputs.version }}"
        $BuildDir = "${{ steps.build.outputs.build_dir }}"
        $ExeDir = "${{ steps.build.outputs.exe_dir }}"
        
        # Find Qt installation - use same logic as build script
        $QtPath = $env:Qt6_DIR
        if (-not $QtPath) {
            $QtPath = $env:QT_ROOT_DIR
        }
        if (-not $QtPath -or -not (Test-Path $QtPath)) {
            # Fallback to common paths
            $PossiblePaths = @(
                (Join-Path $env:RUNNER_WORKSPACE "Qt\$env:QT_VERSION\msvc2022_64"),
                "C:\Qt\$env:QT_VERSION\msvc2022_64",
                (Join-Path $env:GITHUB_WORKSPACE "..\Qt\$env:QT_VERSION\msvc2022_64")
            )
            foreach ($Path in $PossiblePaths) {
                if (Test-Path $Path) {
                    $QtPath = $Path
                    break
                }
            }
        }
        
        if (-not $QtPath -or -not (Test-Path $QtPath)) {
            Write-Host "ERROR: Qt installation not found for installer creation!" -ForegroundColor Red
            throw "Qt installation not found!"
        }
        
        # Search for Qt Installer Framework in multiple possible locations
        Write-Host "Searching for Qt Installer Framework..." -ForegroundColor Yellow
        
        $IFWSearchPaths = @(
            (Join-Path $QtPath "../../Tools/QtInstallerFramework/4.10/bin"),
            (Join-Path $QtPath "../../../Tools/QtInstallerFramework/4.10/bin"),
            (Join-Path $env:RUNNER_WORKSPACE "Qt/Tools/QtInstallerFramework/4.10/bin"),
            "C:\Qt\Tools\QtInstallerFramework\4.10\bin"
        )
        
        $IFWPath = ""
        foreach ($SearchPath in $IFWSearchPaths) {
            Write-Host "  Checking: $SearchPath" -ForegroundColor Gray
            if (Test-Path $SearchPath) {
                $IFWPath = $SearchPath
                Write-Host "  Found IFW at: $IFWPath" -ForegroundColor Green
                break
            }
        }
        
        # If not found in fixed paths, try wildcard search
        if ([string]::IsNullOrEmpty($IFWPath)) {
            Write-Host "  Trying wildcard search..." -ForegroundColor Gray
            $WildcardPaths = @(
                "$QtPath/../../../Tools/QtInstallerFramework/*/bin",
                "$env:RUNNER_WORKSPACE/Qt/Tools/QtInstallerFramework/*/bin",
                "C:\Qt\Tools\QtInstallerFramework\*\bin"
            )
            
            foreach ($WildPath in $WildcardPaths) {
                try {
                    $FoundPath = Get-ChildItem -Path $WildPath -Directory -ErrorAction SilentlyContinue | Select-Object -First 1 | ForEach-Object FullName
                    if ($FoundPath) {
                        $IFWPath = $FoundPath
                        Write-Host "  Found IFW via wildcard at: $IFWPath" -ForegroundColor Green
                        break
                    }
                } catch {
                    # Ignore errors in wildcard search
                }
            }
        }
        
        if ([string]::IsNullOrEmpty($IFWPath)) {
            Write-Host "WARNING: Qt Installer Framework not found in any location" -ForegroundColor Yellow
        }
        
        $ProjectRoot = Get-Location
        $IFWProject = Join-Path $ProjectRoot "project_installer"
        $ConfigDir = Join-Path $IFWProject "config"
        $PackagesDir = Join-Path $IFWProject "packages\com.leletools"
        $MetaDir = Join-Path $PackagesDir "meta"
        $DataDir = Join-Path $PackagesDir "data"
        $ConfigXmlPath = Join-Path $ConfigDir "config.xml"
        $PackageXmlPath = Join-Path $MetaDir "package.xml"
        $InstallScriptPath = Join-Path $MetaDir "installscript.qs"
        
        # Ensure installer directories exist
        Write-Host "Creating installer directory structure..." -ForegroundColor Yellow
        if (-not (Test-Path $ConfigDir)) {
            New-Item -ItemType Directory -Path $ConfigDir -Force | Out-Null
        }
        if (-not (Test-Path $MetaDir)) {
            New-Item -ItemType Directory -Path $MetaDir -Force | Out-Null
        }
        if (-not (Test-Path $DataDir)) {
            New-Item -ItemType Directory -Path $DataDir -Force | Out-Null
        }
        
        # Copy application files
        Write-Host "Copying application files..." -ForegroundColor Yellow
        
        $FilesToCopy = Get-ChildItem -Path $ExeDir -File | 
            Where-Object { ($_.Extension -eq ".exe" -or $_.Extension -eq ".dll") -and 
                           $_.Name -notlike "*Installer*" }
        
        foreach ($file in $FilesToCopy) {
            Copy-Item -Path $file.FullName -Destination $DataDir -Force
            Write-Host "  Copied: $($file.Name)" -ForegroundColor Green
        }
        
        # Copy Redis DLL files if they exist
        $VcpkgBinPath = "$env:VCPKG_INSTALLED_DIR\bin"
        if (Test-Path $VcpkgBinPath) {
            $RedisDlls = Get-ChildItem -Path $VcpkgBinPath -Filter "*.dll" |
                Where-Object { $_.Name -like "*redis*" -or $_.Name -like "*hiredis*" }

            foreach ($dll in $RedisDlls) {
                Copy-Item -Path $dll.FullName -Destination $DataDir -Force
                Write-Host "  Copied Redis DLL: $($dll.Name)" -ForegroundColor Green
            }
        }

        # Copy LibSSH DLL files if they exist
        if (Test-Path $VcpkgBinPath) {
            Write-Host "Checking for LibSSH DLL files..." -ForegroundColor Yellow
            $LibSSHDlls = Get-ChildItem -Path $VcpkgBinPath -Filter "*.dll" |
                Where-Object { $_.Name -like "*ssh*" -or $_.Name -like "*crypto*" -or $_.Name -like "*ssl*" }

            foreach ($dll in $LibSSHDlls) {
                try {
                    Copy-Item -Path $dll.FullName -Destination $DataDir -Force
                    Write-Host "  Copied LibSSH DLL: $($dll.Name)" -ForegroundColor Green
                } catch {
                    Write-Host "  Warning: Failed to copy LibSSH DLL: $($dll.Name)" -ForegroundColor Yellow
                }
            }
        } else {
            Write-Host "  Info: vcpkg bin directory not found: $VcpkgBinPath" -ForegroundColor Gray
        }

        # Copy OpenCV DLL files
        $OpenCVBinPath = "C:\opencv\build\x64\vc16\bin"
        if (Test-Path $OpenCVBinPath) {
            Write-Host "Copying OpenCV DLL files..." -ForegroundColor Yellow
            $OpenCVDlls = Get-ChildItem -Path $OpenCVBinPath -Filter "*.dll"

            foreach ($dll in $OpenCVDlls) {
                try {
                    Copy-Item -Path $dll.FullName -Destination $DataDir -Force
                    Write-Host "  Copied OpenCV DLL: $($dll.Name)" -ForegroundColor Green
                } catch {
                    Write-Host "  Warning: Failed to copy OpenCV DLL: $($dll.Name)" -ForegroundColor Yellow
                }
            }
        } else {
            Write-Host "  Warning: OpenCV bin directory not found: $OpenCVBinPath" -ForegroundColor Yellow
        }

        # Copy MySQL Connector DLL files
        $MySQLBinPaths = @(
            "C:\mysql-connector\lib64",
            "C:\mysql-connector\bin"
        )

        foreach ($binPath in $MySQLBinPaths) {
            if (Test-Path $binPath) {
                Write-Host "Copying MySQL DLL files from $binPath..." -ForegroundColor Yellow
                $MySQLDlls = Get-ChildItem -Path $binPath -Filter "*.dll" |
                    Where-Object { $_.Name -like "*mysql*" -or $_.Name -like "*ssl*" -or $_.Name -like "*crypto*" }

                foreach ($dll in $MySQLDlls) {
                    try {
                        Copy-Item -Path $dll.FullName -Destination $DataDir -Force
                        Write-Host "  Copied MySQL DLL: $($dll.Name)" -ForegroundColor Green
                    } catch {
                        Write-Host "  Warning: Failed to copy MySQL DLL: $($dll.Name)" -ForegroundColor Yellow
                    }
                }
            } else {
                Write-Host "  Info: MySQL bin directory not found: $binPath" -ForegroundColor Gray
            }
        }

        # Copy Npcap/WinPcap DLL files (optional for network tools)
        $NpcapPaths = @(
            "C:\Windows\System32\Npcap",        # Npcap installation directory
            "C:\Windows\System32",               # May contain wpcap.dll
            "C:\WinPcap"                        # Legacy WinPcap directory
        )

        $PcapDllFound = $false
        foreach ($npcapPath in $NpcapPaths) {
            if (Test-Path $npcapPath) {
                Write-Host "Checking for pcap DLLs in $npcapPath..." -ForegroundColor Yellow

                # Look for wpcap.dll and packet.dll
                $PcapDlls = Get-ChildItem -Path $npcapPath -Filter "*.dll" |
                    Where-Object { $_.Name -like "*wpcap*" -or $_.Name -like "*packet*" }

                foreach ($dll in $PcapDlls) {
                    try {
                        Copy-Item -Path $dll.FullName -Destination $DataDir -Force
                        Write-Host "  Copied Npcap DLL: $($dll.Name)" -ForegroundColor Green
                        $PcapDllFound = $true
                    } catch {
                        Write-Host "  Warning: Failed to copy Npcap DLL: $($dll.Name)" -ForegroundColor Yellow
                    }
                }
            }
        }

        if (-not $PcapDllFound) {
            Write-Host "  Info: No Npcap/WinPcap DLLs found - network capture features will use fallback methods" -ForegroundColor Gray
            Write-Host "  Note: Npcap can be installed from https://npcap.com/ for enhanced network functionality" -ForegroundColor Gray
        }

        # Copy Qt directories
        $QtDirs = @('platforms', 'imageformats', 'styles', 'translations', 'iconengines', 'generic', 'networkinformation', 'tls')
        foreach ($qtDir in $QtDirs) {
            $QtDirPath = Join-Path $ExeDir $qtDir
            if (Test-Path $QtDirPath) {
                $TargetPath = Join-Path $DataDir $qtDir
                Copy-Item -Path $QtDirPath -Destination $TargetPath -Recurse -Force
                Write-Host "  Copied directory: $qtDir" -ForegroundColor Green
            }
        }
        
        # Create installer
        if ([string]::IsNullOrEmpty($IFWPath)) {
            Write-Host "WARNING: Qt Installer Framework not found, skipping installer creation" -ForegroundColor Yellow
            Write-Host "Installer creation requires Qt Installer Framework to be installed" -ForegroundColor Yellow
            
            # Set dummy output variables to prevent workflow failure
            echo "installer_path=" >> $env:GITHUB_OUTPUT
            echo "installer_name=" >> $env:GITHUB_OUTPUT
            echo "installer_size=0" >> $env:GITHUB_OUTPUT
        } else {
            $BinaryCreator = Join-Path $IFWPath "binarycreator.exe"
            $InstallerName = "LeleToolsInstaller_v$($Version.Replace('.','_')).exe"
            $InstallerPath = Join-Path $ProjectRoot $InstallerName
            
            Write-Host "Creating installer: $InstallerName" -ForegroundColor Yellow
            $PackagesRootDir = Split-Path $DataDir -Parent | Split-Path -Parent
            
            & $BinaryCreator --offline-only -c $ConfigXmlPath -p $PackagesRootDir $InstallerPath
            
            if ($LASTEXITCODE -eq 0 -and (Test-Path $InstallerPath)) {
                $InstallerSize = [math]::Round((Get-Item $InstallerPath).Length / 1MB, 2)
                Write-Host "Installer created successfully!" -ForegroundColor Green
                Write-Host "  File: $InstallerPath" -ForegroundColor Cyan
                Write-Host "  Size: $InstallerSize MB" -ForegroundColor Cyan
                
                echo "installer_path=$InstallerPath" >> $env:GITHUB_OUTPUT
                echo "installer_name=$InstallerName" >> $env:GITHUB_OUTPUT
                echo "installer_size=$InstallerSize" >> $env:GITHUB_OUTPUT
            } else {
                Write-Host "WARNING: Installer creation failed, but continuing..." -ForegroundColor Yellow
                echo "installer_path=" >> $env:GITHUB_OUTPUT
                echo "installer_name=" >> $env:GITHUB_OUTPUT
                echo "installer_size=0" >> $env:GITHUB_OUTPUT
            }
        }
        
    - name: Upload portable ZIP artifact
      uses: actions/upload-artifact@v4
      with:
        name: lele-tools-portable-${{ steps.version.outputs.version }}
        path: "*_Portable.zip"
        retention-days: 90
        
    - name: Upload installer artifact
      if: github.event_name != 'pull_request' && steps.create_installer.outputs.installer_path != ''
      uses: actions/upload-artifact@v4
      with:
        name: lele-tools-installer-${{ steps.version.outputs.version }}
        path: "LeleToolsInstaller_*.exe"
        retention-days: 90
        
    - name: Upload build artifacts (Debug)
      if: github.event_name == 'pull_request'
      uses: actions/upload-artifact@v4
      with:
        name: lele-tools-build-${{ steps.version.outputs.version }}
        path: |
          ${{ steps.build.outputs.exe_dir }}/*.exe
          ${{ steps.build.outputs.exe_dir }}/*.dll
        retention-days: 7
        
    - name: Create portable ZIP package
      id: create_portable
      shell: powershell
      run: |
        Write-Host "Creating portable ZIP package..." -ForegroundColor Green
        
        $Version = "${{ steps.version.outputs.version }}"
        $ExeDir = "${{ steps.build.outputs.exe_dir }}"
        $ZipName = "LeleTools_v$($Version.Replace('.','_'))_Portable.zip"
        $ZipPath = Join-Path (Get-Location) $ZipName
        
        Write-Host "Version: $Version" -ForegroundColor Cyan
        Write-Host "Exe Directory: $ExeDir" -ForegroundColor Cyan
        Write-Host "ZIP Name: $ZipName" -ForegroundColor Cyan
        Write-Host "ZIP Path: $ZipPath" -ForegroundColor Cyan
        
        # Create ZIP package with all files
        if (Test-Path $ExeDir) {
            Write-Host "Found executable directory, creating ZIP..." -ForegroundColor Yellow
            
            # List files to be included
            Write-Host "Files to include:" -ForegroundColor Yellow
            Get-ChildItem -Path $ExeDir | ForEach-Object {
                Write-Host "  $($_.Name)" -ForegroundColor Gray
            }
            
            Compress-Archive -Path "$ExeDir\*" -DestinationPath $ZipPath -Force
            
            if (Test-Path $ZipPath) {
                $ZipSize = [math]::Round((Get-Item $ZipPath).Length / 1MB, 2)
                Write-Host "Portable ZIP created successfully: $ZipName ($ZipSize MB)" -ForegroundColor Green
                
                echo "zip_path=$ZipPath" >> $env:GITHUB_OUTPUT
                echo "zip_name=$ZipName" >> $env:GITHUB_OUTPUT
                echo "zip_size=$ZipSize" >> $env:GITHUB_OUTPUT
            } else {
                Write-Host "ERROR: Failed to create ZIP file" -ForegroundColor Red
                echo "zip_path=" >> $env:GITHUB_OUTPUT
                echo "zip_name=" >> $env:GITHUB_OUTPUT
                echo "zip_size=0" >> $env:GITHUB_OUTPUT
            }
        } else {
            Write-Host "WARNING: Executable directory not found at: $ExeDir" -ForegroundColor Yellow
            echo "zip_path=" >> $env:GITHUB_OUTPUT
            echo "zip_name=" >> $env:GITHUB_OUTPUT
            echo "zip_size=0" >> $env:GITHUB_OUTPUT
        }
        
    - name: Create release
      id: create_release
      if: |
        (github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')) ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || format('v{0}', steps.version.outputs.version) }}
        name: Lele Tools ${{ steps.version.outputs.version }}
        body: |
          ## Lele Tools ${{ steps.version.outputs.version }}
          
          ### 📦 下载选项
          
          **🎯 推荐下载**：
          - **便携版 (ZIP)**: `${{ steps.create_portable.outputs.zip_name }}` (${{ steps.create_portable.outputs.zip_size }} MB)
            - 解压即用，无需安装
            - 包含所有必要的依赖文件
          
          ${{ steps.create_installer.outputs.installer_name && format('- **安装包 (EXE)**: `{0}` ({1} MB)', steps.create_installer.outputs.installer_name, steps.create_installer.outputs.installer_size) || '- **安装包**: 构建中未生成（Qt Installer Framework不可用）' }}
          
          ### 🚀 功能特性
          - 🛠️ 多种实用工具集合
          - 🎨 现代化用户界面
          - 🔧 一键构建、部署和打包
          - 📱 支持多种格式转换
          - 🔐 文本加密解密功能
          - 🌐 网络工具集成
          
          ### 🔧 使用说明
          
          **便携版使用**：
          1. 下载 ZIP 文件
          2. 解压到任意目录
          3. 运行 `lele-tools.exe`
          
          **安装包使用**：
          1. 下载 EXE 安装包
          2. 以管理员身份运行
          3. 按向导完成安装
          
          ### 📋 系统要求
          - Windows 10/11 (x64)
          - Visual C++ Redistributable 2022
          
          ### 🔨 构建信息
          - **构建时间**: ${{ github.event.head_commit.timestamp }}
          - **构建类型**: Release
          - **Qt版本**: ${{ env.QT_VERSION }}
          - **OpenCV支持**: ${{ env.OPENCV_VERSION && 'Yes' || 'No' }}
          - **提交哈希**: `${{ github.sha }}`
          - **分支**: ${{ github.ref_name }}
          
          ---
          
          > 💡 **提示**: 首次使用推荐下载便携版，无需安装即可体验所有功能！
        files: |
          LeleTools_*_Portable.zip
          LeleToolsInstaller_*.exe
          LeleTools-*-x86_64.AppImage
        draft: false
        prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        fail_on_unmatched_files: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-latest
    if: false
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          ninja-build \
          pkg-config \
          libgl1-mesa-dev \
          libxkbcommon-dev \
          libxcb-xinerama0-dev \
          libxcb-cursor-dev \
          libfontconfig1-dev \
          libfreetype6-dev \
          libx11-dev \
          libx11-xcb-dev \
          libxext-dev \
          libxfixes-dev \
          libxi-dev \
          libxrender-dev \
          libxcb1-dev \
          libxcb-glx0-dev \
          libxcb-keysyms1-dev \
          libxcb-image0-dev \
          libxcb-shm0-dev \
          libxcb-icccm4-dev \
          libxcb-sync-dev \
          libxcb-xfixes0-dev \
          libxcb-shape0-dev \
          libxcb-randr0-dev \
          libxcb-render-util0-dev \
          libxcb-util-dev \
          libxcb-xkb-dev \
          libxkbcommon-x11-dev
          
    # 步骤2: 检查Linux平台Qt可用性
    # 在安装前检查架构和模块的可用性，避免安装失败
    - name: Check Qt availability (Linux)
      run: |
        echo "检查Qt ${{ env.QT_VERSION_LINUX }} 在Linux平台的可用性..."
        pip install aqtinstall
        
        # 检查可用架构
        echo "=== 可用架构 ==="
        python -m aqt list-qt linux desktop --arch ${{ env.QT_VERSION_LINUX }} || echo "无法获取架构列表"
        
        # 检查可用模块
        echo "=== 可用模块 ==="
        python -m aqt list-qt linux desktop --modules ${{ env.QT_VERSION_LINUX }} gcc_64 || echo "无法获取模块列表"
        
    # 步骤3: 安装Qt框架（Linux版本）
    # 使用渐进式安装策略确保Qt能够成功安装
    - name: Setup Qt (Base)
      id: qt-install-base
      uses: jurplel/install-qt-action@v3
      with:
        version: ${{ env.QT_VERSION_LINUX }} # Linux Qt版本 6.7.2
        host: linux                        # Linux主机
        target: desktop                    # 桌面应用
        arch: gcc_64                         # GCC 64位架构
        cache: true                        # 启用缓存
        # 不安装额外模块，先确保基础Qt可用
        
    # 尝试安装多媒体模块（可选）
    - name: Setup Qt Multimedia (Optional)
      id: qt-multimedia
      continue-on-error: true              # 允许失败，不影响整体构建
      run: |
        echo "尝试安装Qt Multimedia模块..."
        pip install aqtinstall
        python -m aqt install-qt linux desktop ${{ env.QT_VERSION_LINUX }} gcc_64 --modules qtmultimedia --outputdir ${{ runner.workspace }}/Qt || echo "Qt Multimedia安装失败，将禁用摄像头功能"
        
    # Linux 依赖缓存优化
    - name: Cache system dependencies
      uses: actions/cache@v4
      id: system-deps-cache
      with:
        path: |
          /var/cache/apt/archives
          /usr/local/lib/libredis++*
          /usr/local/lib/libhiredis*
          /usr/local/include/hiredis
          /usr/local/include/sw
        key: ${{ runner.os }}-system-deps-redis-opencv-mysql-v3
        restore-keys: |
          ${{ runner.os }}-system-deps-redis-opencv-mysql
          ${{ runner.os }}-system-deps
        
    - name: Setup redis-plus-plus
      if: steps.system-deps-cache.outputs.cache-hit != 'true'
      run: |
        echo "Installing hiredis and redis-plus-plus from source..."
        
        # Install dependencies
        sudo apt-get install -y git cmake build-essential
        
        # First install hiredis with CMake support
        echo "Installing hiredis..."
        cd /tmp
        git clone https://github.com/redis/hiredis.git
        cd hiredis
        mkdir build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr/local -DENABLE_SSL=OFF
        make -j$(nproc)
        sudo make install
        
        # Then install redis-plus-plus
        echo "Installing redis-plus-plus..."
        cd /tmp
        git clone https://github.com/sewenew/redis-plus-plus.git
        cd redis-plus-plus
        mkdir build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr/local
        make -j$(nproc)
        sudo make install
        
        echo "hiredis and redis-plus-plus installed successfully!"
        
    - name: Update library cache
      run: |
        sudo ldconfig
        
    - name: Setup OpenCV and MySQL
      run: |
        echo "Installing OpenCV..."
        sudo apt-get install -y libopencv-dev libopencv-contrib-dev
        echo "OpenCV installed successfully!"

        echo "Installing MySQL development libraries..."
        sudo apt-get install -y libmysqlclient-dev
        echo "MySQL libraries installed successfully!"
        
    - name: Set version
      id: version
      run: |
        version="${{ github.event.inputs.version }}"
        if [ -z "$version" ]; then
            if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
                version="${{ github.ref_name }}"
                version="${version#v}"
            else
                version="1.0.${{ github.run_number }}"
            fi
        fi
        echo "Version: $version"
        echo "version=$version" >> $GITHUB_OUTPUT
        
    - name: Build project
      id: build
      run: |
        echo "=== Linux Build Started ==="
        echo "Build Type: Release"
        
        PROJECT_ROOT=$(pwd)
        BUILD_DIR="$PROJECT_ROOT/build"
        
        echo "Project Root: $PROJECT_ROOT"
        echo "Build Directory: $BUILD_DIR"
        
        # Clean and create build directory
        rm -rf "$BUILD_DIR"
        mkdir -p "$BUILD_DIR"
        cd "$BUILD_DIR"
        
        echo "Configuring project..."
        
        # 根据Qt Multimedia可用性配置构建选项
        CMAKE_ARGS="-G Ninja -DCMAKE_BUILD_TYPE=Release -DENABLE_REDIS=ON -DWITH_OPENCV=ON -DWITH_MYSQL=ON"
        
        # 检查Qt Multimedia是否可用
        if [ -d "$Qt6_DIR/lib/cmake/Qt6Multimedia" ]; then
            echo "Qt Multimedia可用，启用摄像头功能"
            CMAKE_ARGS="$CMAKE_ARGS -DWITH_QT_MULTIMEDIA=ON"
        else
            echo "Qt Multimedia不可用，禁用摄像头功能"
            CMAKE_ARGS="$CMAKE_ARGS -DWITH_QT_MULTIMEDIA=OFF"
        fi
        
        echo "CMake配置参数: $CMAKE_ARGS"
        cmake $PROJECT_ROOT $CMAKE_ARGS
          
        if [ $? -ne 0 ]; then
            echo "Project configuration failed!"
            exit 1
        fi
        
        echo "Compiling project..."
        cmake --build . --parallel
        
        if [ $? -ne 0 ]; then
            echo "Project compilation failed!"
            exit 1
        fi
        
        echo "Build successful!"
        
        # Find executable
        EXE_FILE=$(find "$BUILD_DIR" -name "lele-tools" -type f -executable | head -n1)
        if [ -z "$EXE_FILE" ]; then
            EXE_FILE=$(find "$BUILD_DIR" -name "*lele*" -type f -executable | head -n1)
        fi
        
        if [ -z "$EXE_FILE" ]; then
            echo "Executable not found!"
            exit 1
        fi
        
        echo "Found executable: $EXE_FILE"
        
        EXE_DIR=$(dirname "$EXE_FILE")
        EXE_NAME=$(basename "$EXE_FILE")
        
        echo "exe_path=$EXE_FILE" >> $GITHUB_OUTPUT
        echo "exe_dir=$EXE_DIR" >> $GITHUB_OUTPUT
        echo "exe_name=$EXE_NAME" >> $GITHUB_OUTPUT
        echo "build_dir=$BUILD_DIR" >> $GITHUB_OUTPUT
        
        cd "$PROJECT_ROOT"
        
    - name: Create AppImage
      id: create_appimage
      if: github.event_name != 'pull_request'
      run: |
        echo "Creating AppImage package..."
        
        VERSION="${{ steps.version.outputs.version }}"
        BUILD_DIR="${{ steps.build.outputs.build_dir }}"
        EXE_FILE="${{ steps.build.outputs.exe_path }}"
        
        # Download linuxdeploy and Qt plugin
        wget -c -nv "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
        wget -c -nv "https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage"
        
        chmod +x linuxdeploy*.AppImage
        
        # Create AppDir structure
        mkdir -p AppDir/usr/bin
        cp "$EXE_FILE" AppDir/usr/bin/
        
        # Create desktop file
        cat > AppDir/lele-tools.desktop << EOF
        [Desktop Entry]
        Type=Application
        Name=Lele Tools
        Comment=Collection of useful tools
        Exec=lele-tools
        Icon=lele-tools
        Categories=Utility;
        EOF
        
        # Create a simple icon (you should replace this with your actual icon)
        mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
        # For now, create a placeholder icon
        convert -size 256x256 xc:blue AppDir/usr/share/icons/hicolor/256x256/apps/lele-tools.png || echo "No icon created"
        
        # Deploy Qt dependencies and create AppImage
        export QMAKE=$Qt6_DIR/bin/qmake
        ./linuxdeploy-x86_64.AppImage --appdir AppDir --plugin qt --output appimage
        
        # Find the created AppImage
        APPIMAGE_FILE=$(find . -name "*.AppImage" | head -n1)
        if [ -n "$APPIMAGE_FILE" ]; then
            # Rename to include version
            NEW_NAME="LeleTools-$VERSION-x86_64.AppImage"
            mv "$APPIMAGE_FILE" "$NEW_NAME"
            
            APPIMAGE_SIZE=$(du -h "$NEW_NAME" | cut -f1)
            echo "AppImage created: $NEW_NAME ($APPIMAGE_SIZE)"
            
            echo "appimage_path=$(pwd)/$NEW_NAME" >> $GITHUB_OUTPUT
            echo "appimage_name=$NEW_NAME" >> $GITHUB_OUTPUT
            echo "appimage_size=$APPIMAGE_SIZE" >> $GITHUB_OUTPUT
        else
            echo "Failed to create AppImage"
            echo "appimage_path=" >> $GITHUB_OUTPUT
            echo "appimage_name=" >> $GITHUB_OUTPUT
            echo "appimage_size=0" >> $GITHUB_OUTPUT
        fi
        
    - name: Upload Linux build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: lele-tools-linux-${{ steps.version.outputs.version }}
        path: |
          LeleTools-*.AppImage
          ${{ steps.build.outputs.exe_path }}
        retention-days: 90
